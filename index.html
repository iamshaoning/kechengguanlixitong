                    }
                };
                
                // 初始化学生选择区域
                updateStudentSelection();
                
                // 事件委托：处理学生选择按钮点击（绑定到学生按钮容器，确保课型切换后仍然有效）
                const bindStudentButtonEvents = () => {
                    const studentButtonsContainer = document.getElementById('student-buttons');
                    if (studentButtonsContainer && studentButtonsContainer.parentNode) {
                        // 移除之前的事件监听器（防止重复绑定）
                        const newContainer = studentButtonsContainer.cloneNode(true);
                        studentButtonsContainer.parentNode.replaceChild(newContainer, studentButtonsContainer);
                        
                        newContainer.addEventListener('click', function(e) {
                            const btn = e.target.closest('.student-btn');
                            if (!btn) return;
                            
                            const lessonType = btn.dataset.lessonType;
                            const color = btn.dataset.color;
                            
                            if (lessonType === '一对一') {
                                // 一对一课型只能选择一个学生
                                document.querySelectorAll('.student-btn').forEach(b => {
                                    b.classList.remove('selected', 'bg-opacity-40');
                                    b.style.backgroundColor = 'transparent';
                                });
                                btn.classList.add('selected', 'bg-opacity-40');
                                btn.style.backgroundColor = color + '40';
                                
                                // 显示选中学生的预设费用
                                const fee = btn.dataset.fee;
                                const feeInput = document.getElementById('course-fee');
                                if (feeInput) {
                                    feeInput.value = fee;
                                    feeInput.classList.remove('text-red-500');
                                }
                            } else {
                                // 多人课型可以多选，但必须同一年级且同一机构
                                const selectedStudents = document.querySelectorAll('.student-btn.selected');
                                const currentOrganization = btn.dataset.organization;
                                const currentGrade = btn.dataset.grade;
                                
                                // 检查是否与已选中学生机构一致
                                let organizationMatch = true;
                                let gradeMatch = true;
                                selectedStudents.forEach(selectedBtn => {
                                    if (selectedBtn.dataset.organization !== currentOrganization) {
                                        organizationMatch = false;
                                    }
                                    if (selectedBtn.dataset.grade !== currentGrade) {
                                        gradeMatch = false;
                                    }
                                });
                                
                                if (!organizationMatch) {
                                    // 机构不一致，显示错误提示
                                    if (typeof notification !== 'undefined') {
                                        notification.show('多人课只能选择同一机构的学生', 'error');
                                    }
                                } else if (!gradeMatch) {
                                    // 年级不一致，显示错误提示
                                    if (typeof notification !== 'undefined') {
                                        notification.show('多人课只能选择同一年级的学生', 'error');
                                    }
                                } else {
                                    // 机构和年级都一致，允许选择
                                    btn.classList.toggle('selected');
                                    btn.classList.toggle('bg-opacity-40');
                                    btn.style.backgroundColor = btn.classList.contains('selected') ? color + '40' : 'transparent';
                                }
                            }
                        });
                    }
                };
                
                // 初始化时绑定事件
                bindStudentButtonEvents();
                
                // 监听课型变化，重新绑定事件
                document.querySelectorAll('input[name="course-lesson-type"]').forEach(radio => {
                    radio.addEventListener('change', () => {
                        updateStudentSelection();
                        // 课型变化后重新绑定事件
                        setTimeout(bindStudentButtonEvents, 10);
                    });
                });
                
                // 绑定保存按钮事件
                const addCourseSave = document.getElementById('add-course-save');
                if (addCourseSave) {
                    addCourseSave.addEventListener('click', () => {
                        const date = document.getElementById('course-date').value;
                        const lessonType = document.querySelector('input[name="course-lesson-type"]:checked').value;
                        const selectedStudents = Array.from(document.querySelectorAll('.student-btn.selected'));
                        const startTime = document.getElementById('course-start-time').value;
                        const endTime = document.getElementById('course-end-time').value;
                        const note = utils.escapeHtml(document.getElementById('course-note').value);
                        
                        // 验证输入
                        if (!date || selectedStudents.length === 0 || !startTime || !endTime) {
                            notification.show('请填写完整信息', 'error');
                            return;
                        }
                        
                        // 验证时间
                        if (startTime >= endTime) {
                            notification.show('结束时间必须晚于开始时间', 'error');
                            return;
                        }
                        
                        // 获取费用输入值
                        let courseFee = 0;
                        const feeInput = document.getElementById('course-fee').value;
                        if (feeInput && !isNaN(parseFloat(feeInput)) && parseFloat(feeInput) >= 0) {
                            courseFee = parseFloat(feeInput);
                        } else {
                            notification.show('请填写单节课费用', 'error');
                            return;
                        }
                        
                        const course = {
                            id: utils.generateId(),
                            date,
                            lessonType,
                            studentIds: selectedStudents.map(btn => btn.dataset.id),
                            studentNames: selectedStudents.map(btn => btn.dataset.name),
                            organizations: selectedStudents.map(btn => btn.dataset.organization),
                            colors: selectedStudents.map(btn => btn.dataset.color),
                            fees: selectedStudents.map(() => courseFee),
                            startTime,
                            endTime,
                            note,
                            createdAt: new Date().toISOString()
                        };
                        
                        // 检查时间冲突
                        if (window.checkTimeConflict(course)) {
                            notification.show('课程时间与当天其他课程冲突，请修改时间', 'error');
                            return;
                        }
                        
                        state.courses.push(course);
                        utils.saveData();
                        render.calendar();
                        modal.hide();
                        
                        notification.show(`课程添加成功，共 ${selectedStudents.length} 名学生`);
                    });
                }
                
                // 绑定时间输入框事件
                const courseStartTime = document.getElementById('course-start-time');
                if (courseStartTime) {
                    courseStartTime.addEventListener('change', calculateFee);
                }
                
                const courseEndTime = document.getElementById('course-end-time');
                if (courseEndTime) {
                    courseEndTime.addEventListener('change', calculateFee);
                }
                
                // 绑定费用输入框事件
                const courseFee = document.getElementById('course-fee');
                if (courseFee) {
                    courseFee.addEventListener('input', function() {
                        // 移除所有颜色标记
                        this.classList.remove('text-red-500');
                    });
                }
                
                // 回车键保存课程
                const courseInputs = ['course-date', 'course-start-time', 'course-end-time', 'course-note', 'course-fee'];
                courseInputs.forEach(id => {
                    const element = document.getElementById(id);
                    if (element) {
                        element.addEventListener('keypress', (event) => {
                            if (event.key === 'Enter') {
                                event.preventDefault();
                                addCourseSave.click();
                            }
                        });
                    }
                });
            },
            
            // 显示课程详情模态框
            showCourseDetail: (courseId) => {
                const course = state.courses.find(c => c.id === courseId);
                if (!course) return;
                
                let studentsContent = '';
                let totalFee = 0;
                const courseLessonType = course.lessonType || '一对一';
                const isGroupLesson = courseLessonType === '多人课';
                
                // 对于多人课，直接使用输入的费用
                if (isGroupLesson) {
                    totalFee = course.fees && course.fees[0] !== undefined ? course.fees[0] : 0;
                }
                
                if (course.studentIds) {
                    // 多名学生的课程
                    studentsContent = `
                        <div class="flex flex-wrap gap-2">
                            ${course.studentNames.map((name, index) => {
                                const student = state.students.find(s => s.id === course.studentIds[index]);
                                // 使用课程中的费用（一对一使用学生预设费用，多人课不计算学生费用）
                                let fee = 0;
                                if (!isGroupLesson) {
                                    fee = utils.getCourseFee(course, student, index);
                                    totalFee += fee;

                                return `

                                          style="background-color: ${course.colors[index]}20; color: ${course.colors[index]};"

                                    </span>
                                `;
                            }).join('')}
                        </div>
                    `;

                        const color = utils.generateColor(student.organization);
                        
                        studentsContent = `
                            <span class="px-2 py-1 rounded text-xs"

                            if (addStudentSave) {

                    });

                // 绑定保存按钮事件
                const addStudentSave = document.getElementById('add-student-save');
                if (addStudentSave) {
                    addStudentSave.addEventListener('click', () => {
                        const studentName = document.getElementById('student-name');

                        const name = utils.escapeHtml(studentName.value.trim());
                        const organization = utils.escapeHtml(getCustomSelectValue('student-organization-wrapper'));

                        // 验证姓名

                        const groupChecked = document.getElementById('lesson-type-group').checked;

                        if (!oneOnOneChecked && !groupChecked) {
                            notification.show('请至少选择一种课型', 'error');
                            return;
                        }
                        
                        // 构建课型数组和费用对象
                        const lessonTypes = [];
                        const fees = {};
                        
                        if (oneOnOneChecked) {
                            lessonTypes.push('一对一');
                            const feeInput = document.getElementById('fee-one-on-one').value;
                            const fee = parseFloat(feeInput);
                            if (feeInput === '' || isNaN(fee) || fee < 0) {

                                return;

                            createdAt: new Date().toISOString()

                        const id = utils.escapeHtml(idElement.value);

                        const organization = utils.escapeHtml(getCustomSelectValue('edit-student-organization-wrapper'));

                        const groupChecked = groupElement.checked;

            // 显示管理模态框（通用函数）
            showManagementModal: (config) => {
                const { title, items, itemName, addItem, editItem, deleteItem, onAdd, onEdit, onDelete, updateUI } = config;
                
                const content = `
                    <div class="bg-white rounded-lg shadow-xl w-full max-w-md mx-4">
                        <div class="p-6">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="text-lg font-medium">${title}</h3>
                                <button class="close-modal text-gray-400 hover:text-gray-600">

                                </button>
                            </div>
                            <div class="mb-4">
                                <div class="flex items-center space-x-2 mb-2">
                                    <input type="text" id="new-${itemName}" class="flex-grow px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-primary focus:border-primary">
                                    <button id="add-${itemName}" class="bg-primary text-white px-3 py-2 rounded-md">添加</button>
                                </div>
                            </div>
                            <div>
                                <h4 class="text-sm font-medium text-gray-700 mb-2">已有${itemName}</h4>
                                <div id="${itemName}s-list" class="space-y-2 max-h-60 overflow-y-auto pr-2">
                                    ${items.map(item => `
                                        <div class="flex items-center justify-between p-2 bg-gray-50 rounded" data-${itemName}="${utils.escapeHtml(item)}">
                                            <span class="${itemName}-name">${utils.escapeHtml(item)}</span>
                                            <div class="flex items-center">
                                                <button class="edit-${itemName} w-8 h-8 rounded-full bg-white text-gray-600 flex items-center justify-center cursor-pointer shadow-lg mr-2 hover:bg-gray-100 active:bg-gray-200 active:scale-95" data-${itemName}="${utils.escapeHtml(item)}" style="box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);">
                                                    <i class="fa fa-pencil text-xs"></i>
                                                </button>
                                                <button class="delete-${itemName} w-8 h-8 rounded-full bg-white text-gray-600 flex items-center justify-center cursor-pointer shadow-lg hover:bg-gray-100 active:bg-gray-200 active:scale-95" data-${itemName}="${utils.escapeHtml(item)}" style="box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);">
                                                    <i class="fa fa-trash text-xs"></i>
                                                </button>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                            <div class="flex justify-end mt-6">
                                <button type="button" class="close-modal px-4 py-2 text-gray-700">关闭</button>
                            </div>
                        </div>
                    </div>
                `;
                
                modal.show(content);
                
                // 自动激活输入框并绑定事件
                setTimeout(() => {
                    // 缓存DOM元素引用
                    const newItemInput = document.getElementById(`new-${itemName}`);
                    const itemsList = document.getElementById(`${itemName}s-list`);
                    const addItemBtn = document.getElementById(`add-${itemName}`);
                    
                    // 激活输入框
                    if (newItemInput) {
                        newItemInput.focus();
                    }
                    
                    // 使用事件委托处理管理操作
                    if (itemsList) {
                        // 移除之前的事件监听器（防止重复绑定）
                        itemsList.onclick = null;
                        
                        itemsList.onclick = (event) => {
                            const editButton = event.target.closest(`.edit-${itemName}`);
                            const deleteButton = event.target.closest(`.delete-${itemName}`);
                            
                            if (editButton) {
                                event.stopPropagation();
                                const item = editButton.dataset[itemName];
                                // 找到外层的项div（排除按钮本身）
                                let itemElement = editButton.closest(`[data-${itemName}]`);
                                // 如果找到的是按钮本身，继续向上查找
                                while (itemElement && itemElement.tagName === 'BUTTON') {
                                    itemElement = itemElement.parentElement.closest(`[data-${itemName}]`);
                                }
                                if (!itemElement) {
                                    console.error(`找不到${itemName}项元素`);
                                    return;
                                }
                                const itemNameSpan = itemElement.querySelector(`.${itemName}-name`);
                                if (!itemNameSpan) {
                                    console.error(`找不到${itemName}名称元素`);
                                    return;
                                }
                                
                                // 创建编辑输入框
                                const input = document.createElement('input');
                                input.type = 'text';
                                input.value = item;
                                input.className = 'flex-grow px-2 py-1 border border-gray-300 rounded text-sm';
                                
                                // 替换文本为输入框
                                itemNameSpan.replaceWith(input);
                                input.focus();
                                input.select();
                                
                                // 保存按钮 - 使用与编辑按钮相同的圆形样式
                                const saveBtn = document.createElement('button');
                                saveBtn.className = 'w-8 h-8 rounded-full bg-white text-success flex items-center justify-center cursor-pointer shadow-lg mr-2 hover:bg-gray-100 active:bg-gray-200 active:scale-95';
                                saveBtn.style.boxShadow = '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)';
                                saveBtn.innerHTML = '<i class="fa fa-check text-xs"></i>';
                                
                                // 取消按钮 - 使用与删除按钮相同的圆形样式
                                const cancelBtn = document.createElement('button');
                                cancelBtn.className = 'w-8 h-8 rounded-full bg-white text-danger flex items-center justify-center cursor-pointer shadow-lg hover:bg-gray-100 active:bg-gray-200 active:scale-95';
                                cancelBtn.style.boxShadow = '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)';
                                cancelBtn.innerHTML = '<i class="fa fa-times text-xs"></i>';
                                
                                // 替换编辑和删除按钮为保存和取消按钮
                                const btnContainer = editButton.parentElement;
                                if (!btnContainer) {
                                    console.error('找不到按钮容器');
                                    return;
                                }
                                // 使用 replaceChildren 更安全地替换子元素
                                btnContainer.replaceChildren(saveBtn, cancelBtn);
                                
                                // 保存编辑
                                const saveEdit = () => {
                                    const newItem = input.value.trim();
                                    
                                    // 如果没有修改或为空，直接返回
                                    if (!newItem || newItem === item) {
                                        modal.showManagementModal(config); // 重新渲染
                                        return;
                                    }
                                    
                                    // 检查是否已存在
                                    if (items.includes(newItem)) {
                                        notification.show(`该${itemName}名称已存在`, 'error');
                                        return;
                                    }
                                    
                                    // 更新项名称
                                    const itemIndex = items.indexOf(item);
                                    if (itemIndex !== -1) {
                                        editItem(itemIndex, newItem);
                                        if (onEdit) onEdit(item, newItem);
                                        utils.saveData();
                                        notification.show(`${itemName}修改成功`);
                                        if (updateUI) updateUI();
                                    }
                                    modal.showManagementModal(config); // 重新渲染
                                };
                                
                                // 取消编辑
                                const cancelEdit = () => {
                                    modal.showManagementModal(config); // 重新渲染
                                };
                                
                                // 绑定保存按钮点击事件
                                saveBtn.addEventListener('click', saveEdit);
                                
                                // 绑定取消按钮点击事件
                                cancelBtn.addEventListener('click', cancelEdit);
                                
                                // 绑定回车键保存
                                input.addEventListener('keypress', (event) => {
                                    if (event.key === 'Enter') {
                                        event.preventDefault();
                                        saveEdit();
                                    }
                                });
                                
                                // 绑定ESC键取消
                                input.addEventListener('keydown', (event) => {
                                    if (event.key === 'Escape') {
                                        event.preventDefault();
                                        cancelEdit();
                                    }
                                });
                                
                                // 失去焦点时保存
                                input.addEventListener('blur', saveEdit);
                            } else if (deleteButton) {
                                event.stopPropagation();
                                const item = deleteButton.dataset[itemName];
                                const used = onDelete ? onDelete(item) : false;
                                if (used) {
                                    notification.show(`该${itemName}正在被使用，无法删除`, 'error');
                                    return;
                                }
                                deleteItem(item);
                                utils.saveData();
                                // 重新获取最新的配置（包含更新后的items）
                                const updatedConfig = {
                                    ...config,
                                    items: config.items.filter(i => i !== item) // 更新items数组
                                };
                                modal.showManagementModal(updatedConfig); // 重新渲染
                                notification.show(`${itemName}删除成功`);
                                if (updateUI) updateUI();
                            }
                        };
                    }
                    
                    // 添加项
                    if (addItemBtn) {
                        // 移除之前的事件监听器（防止重复绑定）
                        addItemBtn.onclick = null;
                        addItemBtn.onclick = () => {
                            if (newItemInput) {
                                const newItem = newItemInput.value.trim();
                                if (newItem && !items.includes(newItem)) {
                                    addItem(newItem);
                                    if (onAdd) onAdd(newItem);
                                    utils.saveData();

        (function() {
            // 根据开始时间计算结束时间
            window.calculateEndTime = function(startId, endId, minutesToAdd) {
                const startTimeInput = document.getElementById(startId);
                const endTimeInput = document.getElementById(endId);
                
                if (startTimeInput && endTimeInput) {
                    const startTime = startTimeInput.value;
                    if (startTime) {
                        const [hours, minutes] = startTime.split(':').map(Number);
                        const totalMinutes = hours * 60 + minutes + minutesToAdd;
                        const endHours = Math.floor(totalMinutes / 60) % 24;
                        const endMinutes = totalMinutes % 60;
                        
                        const formattedEndTime = `${endHours.toString().padStart(2, '0')}:${endMinutes.toString().padStart(2, '0')}`;
                        endTimeInput.value = formattedEndTime;
                        
                        // 触发费用计算
                        setTimeout(() => {
                            if (typeof window.calculateFee === 'function') {
                                window.calculateFee();
                            }
                        }, 10);
                    }
                }
            };
            
            // 调整时间（增加或减少指定分钟数）
            window.adjustTime = function(timeId, minutesToAdd) {
                const timeInput = document.getElementById(timeId);
                if (timeInput) {
                    const time = timeInput.value;
                    if (time) {
                        const [hours, minutes] = time.split(':').map(Number);
                        let totalMinutes = hours * 60 + minutes + minutesToAdd;
                        
                        // 确保总分钟数在有效范围内（0-1439）
                        totalMinutes = (totalMinutes + 1440) % 1440;
                        
                        const endHours = Math.floor(totalMinutes / 60);
                        const endMinutes = totalMinutes % 60;
                        
                        const formattedTime = `${endHours.toString().padStart(2, '0')}:${endMinutes.toString().padStart(2, '0')}`;
                        timeInput.value = formattedTime;
                        
                        // 触发费用计算
                        setTimeout(() => {
                            if (typeof window.calculateFee === 'function') {
                                window.calculateFee();
                            }
                        }, 10);
                    }
                }
            };
            
            // 检查课程时间冲突
            window.checkTimeConflict = function(newCourse) {
                // 获取当天的所有课程
                const sameDayCourses = state.courses.filter(course => {
                    // 排除当前编辑的课程
                    if (newCourse.id && course.id === newCourse.id) {
                        return false;
                    }
                    return course.date === newCourse.date;
                });
                
                // 检查每门课程是否与新课程时间冲突
                for (const course of sameDayCourses) {
                    // 检查时间是否有交集
                    if (
                        (newCourse.startTime < course.endTime && newCourse.endTime > course.startTime)
                    ) {
                        return true; // 有冲突
                    }
                }
                
                return false; // 无冲突
            };

            // 计算课程时长（分钟）
            window.calculateDuration = function() {
                const startTime = document.getElementById('course-start-time').value;
                const endTime = document.getElementById('course-end-time').value;
                
                if (startTime && endTime) {
                    const [startHour, startMinute] = startTime.split(':').map(Number);
                    const [endHour, endMinute] = endTime.split(':').map(Number);
                    
                    const startTotalMinutes = startHour * 60 + startMinute;
                    const endTotalMinutes = endHour * 60 + endMinute;
                    
                    return endTotalMinutes - startTotalMinutes;
                }
                return APP_CONFIG.DEFAULT_COURSE_DURATION; // 默认2小时
            };
            
            // 根据课程时长计算费用
            window.calculateFee = function() {
                // 检查当前课型
                const lessonType = document.querySelector('input[name="course-lesson-type"]:checked')?.value;
                if (lessonType !== '一对一') return; // 只对一对一课程计算费用
                
                const selectedStudents = Array.from(document.querySelectorAll('.student-btn.selected'));
                if (selectedStudents.length === 0) return;
                
                const studentId = selectedStudents[0].dataset.id;
                const student = state.students.find(s => s.id === studentId);
                if (!student) return;
                
                const studentFees = student.fees || (student.fee ? { '一对一': student.fee } : {});
                const baseFee = studentFees['一对一'] || 0;
                const baseDuration = studentFees['一对一_duration'] || APP_CONFIG.DEFAULT_COURSE_DURATION; // 默认课程时长
                const actualDuration = window.calculateDuration();
                
                // 按学生预设时长的价格计算实际费用
                const calculatedFee = (baseFee / baseDuration) * actualDuration;
                
                const feeInput = document.getElementById('course-fee');
                if (feeInput) {
                    feeInput.value = calculatedFee.toFixed(2);
                }
            };

                // 添加选中状态
                element.classList.add('course-item-selected');
                
                // 显示右键菜单
                const contextMenu = elements.contextMenu;
                
                // 为课程元素恢复右键菜单选项
                const menuItems = contextMenu.querySelectorAll('.context-menu-item');
                menuItems.forEach(item => {
                    if (item.dataset.action === 'add') {
                        item.textContent = '详情';
                        item.dataset.action = 'details';
                        item.classList.remove('text-red-600');
                    } else if (item.dataset.action === 'edit') {
                        // 显示编辑选项
                        item.style.display = 'block';
                        item.classList.remove('text-red-600');
                    } else {
                        // 显示其他选项
                        item.style.display = 'block';
                        if (item.dataset.action === 'delete') {
                            item.classList.add('text-red-600');
                        } else {
                            item.classList.remove('text-red-600');
                        }
                    }
                });
                
                // 计算菜单位置，确保不会被遮挡
                const menuWidth = contextMenu.offsetWidth || 200;
                const menuHeight = contextMenu.offsetHeight || 200;
                const windowWidth = window.innerWidth;
                const windowHeight = window.innerHeight;
                
                let left = event.clientX;
                let top = event.clientY;
                
                // 检查右侧是否会被遮挡
                if (left + menuWidth > windowWidth) {
                    left = windowWidth - menuWidth - 10;
                }
                
                // 检查底部是否会被遮挡
                if (top + menuHeight > windowHeight) {
                    top = windowHeight - menuHeight - 10;
                }
                
                // 确保菜单在视口内
                left = Math.max(0, left);
                top = Math.max(0, top);
                
                contextMenu.style.left = `${left}px`;
                contextMenu.style.top = `${top}px`;
                contextMenu.classList.remove('hidden');
                
                // 禁用滚轮事件，防止菜单跟随滚动
                contextMenu.style.position = 'fixed';
                contextMenu.style.zIndex = '50';
                
                // 点击菜单项时的处理
                document.querySelectorAll('.context-menu-item').forEach(item => {
                    item.onclick = function() {
                        const action = this.dataset.action;
                        
                        if (action === 'details') {
                            // 显示课程详情
                            modal.showCourseDetail(courseId);
                        } else if (action === 'edit') {
                            // 编辑课程
                            const course = state.courses.find(c => c.id === courseId);
                            if (course) {
                                modal.showEditCourse(course);
                            }
                        } else if (action === 'copy') {
                            // 复制选中的课程
                            const course = state.courses.find(c => c.id === courseId);
                            if (course) {
                                utils.copyCourses([course]);
                            }
                        } else if (action === 'paste') {
                            // 粘贴课程到当前课程所在的日期
                            const currentCourse = state.courses.find(c => c.id === courseId);
                            if (currentCourse) {
                                utils.pasteCourses(currentCourse.date);
                            }
                        } else if (action === 'delete') {
                            // 删除课程
                            modal.showConfirm('确定要删除这节课程吗？', () => {
                                state.courses = state.courses.filter(c => c.id !== courseId);
                                utils.saveData();
                                render.calendar();
                                notification.show('课程删除成功');
                            });
                        }
                        
                        // 隐藏右键菜单
                        contextMenu.classList.add('hidden');
                    };
                });
            };
            
            // 自定义下拉菜单功能
            window.initCustomSelects = function() {
                // 使用事件委托处理选项点击
                document.querySelectorAll('.custom-select').forEach(select => {
                    const trigger = select.querySelector('.custom-select-trigger');
                    const options = select.querySelector('.custom-select-options');
                    
                    if (!trigger || !options) return;
                    
                    // 如果已经初始化过，跳过（防止重复绑定）
                    if (select.dataset.initialized === 'true') return;
                    select.dataset.initialized = 'true';
                    
                    // 点击触发器展开/收缩
                    trigger.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const isOpen = options.classList.contains('open');
                        
                        // 关闭所有其他下拉菜单
                        document.querySelectorAll('.custom-select-options.open').forEach(opt => {
                            opt.classList.remove('open');
                            opt.previousElementSibling?.classList.remove('active');
                        });
                        
                        // 切换当前下拉菜单
                        if (!isOpen) {
                            options.classList.add('open');
                            trigger.classList.add('active');
                        }
                    });
                    
                    // 使用事件委托处理选项点击
                    options.addEventListener('click', (e) => {
                        const option = e.target.closest('.custom-option');
                        if (!option) return;
                        
                        e.stopPropagation();
                        
                        // 更新选中状态
                        options.querySelectorAll('.custom-option').forEach(opt => opt.classList.remove('selected'));
                        option.classList.add('selected');
                        
                        // 更新触发器文本
                        const value = option.dataset.value;
                        const text = option.textContent;
                        trigger.querySelector('span').textContent = text;
                        
                        // 关闭下拉菜单
                        options.classList.remove('open');
                        trigger.classList.remove('active');
                        
                        // 触发自定义事件
                        select.dispatchEvent(new CustomEvent('change', { 
                            detail: { value, text }
                        }));
                        
                        // 如果是机构选择下拉菜单，自动刷新统计数据
                        if (select.id === 'statistics-organization-wrapper') {
                            const { year, month } = utils.getStatisticsParams();
                            render.statistics(year, month, value);
                        }
                    });
                });
                
                // 点击外部关闭所有下拉菜单（只绑定一次）
                if (!window.customSelectOutsideClickBound) {
                    window.customSelectOutsideClickBound = true;
                    document.addEventListener('click', () => {
                        document.querySelectorAll('.custom-select-options.open').forEach(options => {
                            options.classList.remove('open');
                            options.previousElementSibling?.classList.remove('active');
                        });
                    });
                }
            };
            
            // 辅助函数：获取自定义下拉菜单的选中值
            window.getCustomSelectValue = function(wrapperId) {
                const wrapper = document.getElementById(wrapperId);
                if (!wrapper) return null;
                const selected = wrapper.querySelector('.custom-option.selected');
                return selected ? selected.dataset.value : null;
            };
            
            // 辅助函数：设置自定义下拉菜单的值
            window.setCustomSelectValue = function(wrapperId, value) {
                const wrapper = document.getElementById(wrapperId);
                if (!wrapper) return;
                const options = wrapper.querySelectorAll('.custom-option');
                const trigger = wrapper.querySelector('.custom-select-trigger span');
                options.forEach(opt => {
                    if (opt.dataset.value === String(value)) {
                        opt.classList.add('selected');
                        if (trigger) trigger.textContent = opt.textContent;
                    } else {
                        opt.classList.remove('selected');
                    }
                });

            // 日期选择器功能

            window.renderDateGrid = function() {
                const dateInput = document.getElementById('course-date');
                const dateGrid = document.getElementById('date-grid');
                const monthTitle = document.getElementById('current-date-month');
                
                if (!dateInput || !dateGrid || !monthTitle) return;
                
                const currentDate = dateInput.value ? new Date(dateInput.value) : new Date();
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                
                monthTitle.textContent = `${year}年${month + 1}月`;
                
                const firstDay = new Date(year, month, 1);
                const lastDay = new Date(year, month + 1, 0);
                const startDate = new Date(firstDay);
                startDate.setDate(startDate.getDate() - firstDay.getDay());
                
                let html = '';
                for (let i = 0; i < 42; i++) {
                    const date = new Date(startDate);
                    date.setDate(startDate.getDate() + i);
                    
                    const isCurrentMonth = date.getMonth() === month;
                    const isToday = date.toDateString() === new Date().toDateString();
                    
                    // 格式化为本地日期字符串，避免时区问题
                    const dateString = window.formatDate(date);
                    const isSelected = dateInput.value === dateString;
                    
                    // 确保今天的样式优先级高于选中的样式
                    let classes = `py-1 text-center text-sm rounded ${isCurrentMonth ? '' : 'text-gray-300'}`;
                    if (isToday) {
                        classes += ' bg-primary text-white';
                    } else if (isSelected) {
                        classes += ' bg-primary/20';
                    } else {
                        classes += ' hover:bg-gray-100';
                    }
                    
                    html += `
                        <button type="button" class="${classes} date-grid-btn" data-date="${dateString}">
                            ${date.getDate()}
                        </button>
                    `;
                }
                
                dateGrid.innerHTML = html;
                
                // 事件委托：处理日期选择
                dateGrid.addEventListener('click', function(e) {
                    const btn = e.target.closest('.date-grid-btn');
                    if (btn) {
                        window.selectDate(btn.dataset.date);
                    }
                });
            };
            
            // 格式化日期为 YYYY-MM-DD 格式，使用本地时间
            window.formatDate = function(date) {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            };
            
            window.selectDate = function(date) {
                const dateInput = document.getElementById('course-date');
                const dateContainer = document.getElementById('course-date-container');
                if (dateInput) {

                if (dateContainer) {

                dateInput.value = window.formatDate(currentDate);

            };

            // 点击外部关闭时间选择器

                const startTimeInput = document.querySelector('[data-action="toggle-time-picker"][data-target="start-time-container"]');
                const endTimeInput = document.querySelector('[data-action="toggle-time-picker"][data-target="end-time-container"]');
                
                if (startContainer && !startContainer.contains(event.target) && !startTimeInput.contains(event.target)) {
                    startContainer.classList.add('hidden');
                }
                if (endContainer && !endContainer.contains(event.target) && !endTimeInput.contains(event.target)) {
                    endContainer.classList.add('hidden');
                }
                
                // 如果两个选择器都关闭了，移除监听
                if ((!startContainer || startContainer.classList.contains('hidden')) && 
                    (!endContainer || endContainer.classList.contains('hidden'))) {
                    document.removeEventListener('click', window.closeTimePickerOnOutsideClick);
                }
            };
            
            window.setTime = function(inputId, time) {
                const input = document.getElementById(inputId);
                if (!input) return;
                
                input.value = time;
                
                // 关闭时间选择器
                if (inputId === 'course-start-time') {

            // 选择小时
            window.selectTimeHour = function(inputId, hour) {
                const input = document.getElementById(inputId);
                if (!input) return;
                
                const currentValue = input.value || '00:00';
                const [, minute] = currentValue.split(':');
                input.value = `${hour}:${minute}`;
                
                // 触发费用计算

                    window.calculateFee();

                    window.calculateEndTime('course-start-time', 'course-end-time', 120);
                }

            // 选择分钟

                const input = document.getElementById(inputId);
                if (!input) return;
                
                const currentValue = input.value || '00:00';
                const [hour] = currentValue.split(':');
                input.value = `${hour}:${minute}`;
                
                // 触发费用计算
                if (typeof window.calculateFee === 'function') {
                    window.calculateFee();
                }
                
                // 如果是开始时间，自动计算结束时间
                if (inputId === 'course-start-time' && typeof window.calculateEndTime === 'function') {
                    window.calculateEndTime('course-start-time', 'course-end-time', 120);
                }
            };
        })();

        // 初始化应用
        async function init() {
            try {
                // 初始化事件监听
                events.init();

                // 初始化认证
                initAuth();

                // 等待 DOM 完全加载
                await new Promise(resolve => {
                    if (document.readyState === 'loading') {
                        document.addEventListener('DOMContentLoaded', resolve);
                    } else {
                        resolve();
                    }
                });

                // 等待 Supabase 初始化完成
                await window.supabaseReady;

                const auth = window.supabaseAuth;
                if (auth) {
                    // 认证状态检查函数
                    const checkAuthStatus = async (retries = 5) => {
                        try {
                            const { data } = await utils.withTimeout(() => auth.getSession(), 5000, '获取会话超时');
                            const session = data.session;
                            if (session) {
                                // 用户已登录，更新UI并加载渲染系统
                                const user = session.user;
                                console.log('用户已登录，更新UI并加载渲染系统...');
                                updateUIForAuth(user);
                                loadSystem();
                                
                                // 存储登录时间，用于会话管理
                                localStorage.setItem('sb-login-time', Date.now().toString());
                                return true;
                            } else {
                                // 会话为 null，可能是会话还未初始化，进行重试
                                if (retries > 0) {
                                    console.log('会话未初始化，重试中...', 6 - retries);
                                    // 增加重试间隔，给 Supabase 更多时间恢复会话
                                    setTimeout(() => checkAuthStatus(retries - 1), 800);
                                } else {
                                    // 重试次数用完，确认用户未登录
                                    console.log('用户未登录，只显示登录框');
                                    // 清理会话相关数据
                                    localStorage.removeItem('sb-login-time');
                                    updateUIForUnauth();
                                    return false;
                                }
                            }
                        } catch (error) {
                            utils.handleError(error, '获取会话失败');
                            if (retries > 0) {
                                console.log('获取会话失败，重试中...', 6 - retries);
                                setTimeout(() => checkAuthStatus(retries - 1), 800);
                            } else {
                                // 清理会话相关数据
                                localStorage.removeItem('sb-login-time');
                                updateUIForUnauth();
                                return false;
                            }
                        }
                    };

                    // 主动检查当前会话状态，最多重试5次
                    checkAuthStatus();
                    
                    // 设置认证状态变化监听器
                    let authStateChangeTimer = null;
                    auth.onAuthStateChange(({ session, user }) => {
                        try {
                            if (session && user) {
                                // 用户已登录，更新UI并加载渲染系统
                                console.log('用户已登录，更新UI并加载渲染系统...');
                                updateUIForAuth(user);
                                loadSystem();
                                
                                // 存储登录时间，用于会话管理
                                localStorage.setItem('sb-login-time', Date.now().toString());
                            } else {
                                // 用户未登录，添加防抖动，避免短暂的认证状态变化导致误触发
                                console.log('检测到认证状态变化，等待确认...');
                                if (authStateChangeTimer) {
                                    clearTimeout(authStateChangeTimer);
                                }
                                authStateChangeTimer = setTimeout(() => {
                                    // 再次检查会话状态
                                    utils.withTimeout(() => auth.getSession(), 5000, '获取会话超时')
                                        .then(({ data }) => {
                                            const currentSession = data.session;
                                            if (!currentSession) {
                                                console.log('用户确实未登录，只显示登录框');
                                                // 清理会话相关数据
                                                localStorage.removeItem('sb-login-time');
                                                updateUIForUnauth();
                                            } else {
                                                console.log('认证状态已恢复，用户仍已登录');
                                                updateUIForAuth(currentSession.user);
                                                loadSystem();
                                                // 存储登录时间，用于会话管理
                                                localStorage.setItem('sb-login-time', Date.now().toString());
                                            }
                                        })
                                        .catch((error) => {
                                            utils.handleError(error, '获取会话失败');
                                            // 清理会话相关数据
                                            localStorage.removeItem('sb-login-time');
                                            updateUIForUnauth();
                                        });
                                }, APP_CONFIG.AUTH_DEBOUNCE_TIME); // 防抖
                            }
                        } catch (error) {
                            utils.handleError(error, '处理认证状态变化失败');
                        }
                    });
                    
                    // 定期检查会话状态，确保会话有效
                    setInterval(() => {
                        try {
                            auth.getSession().then(({ data: { session } }) => {
                                if (!session) {
                                    console.log('会话已过期，重定向到登录页面');
                                    // 清理会话相关数据
                                    localStorage.removeItem('sb-login-time');
                                    updateUIForUnauth();
                                } else {
                                    // 检查登录时间，超过24小时自动登出
                                    const loginTime = localStorage.getItem('sb-login-time');
                                    if (loginTime) {
                                        const now = Date.now();
                                        const loginTimestamp = parseInt(loginTime);
                                        const hoursSinceLogin = (now - loginTimestamp) / (1000 * 60 * 60);
                                        if (hoursSinceLogin > 24) {
                                            console.log('登录时间超过24小时，自动登出');
                                            auth.signOut().then(() => {
                                                localStorage.removeItem('sb-login-time');
                                                updateUIForUnauth();
                                                notification.show('登录时间已超过24小时，请重新登录', 'info');
                                            });
                                        }
                                    }
                                }
                            });
                        } catch (error) {
                            console.error('定期检查会话状态失败:', error);
                        }
                    }, 5 * 60 * 1000); // 每5分钟检查一次
                } else {
                    // Supabase 不可用，显示登录框
                    console.log('Supabase 不可用，显示登录框');
                    updateUIForUnauth();
                }
            } catch (error) {
                utils.handleError(error, '初始化应用失败', true);
                // 即使初始化失败，也要显示登录框
                updateUIForUnauth();
            }
        }

                // 试用模式：用户名为test，密码留空
                if (email === 'test' && password === '') {
                    // 显示加载状态

                    notification.show('请输入密码', 'error');

                                        window.supabaseConfig.key,

                                utils.handleError(error, '注册失败', true);
                                
                                // 恢复按钮状态
                                if (registerBtnText && registerLoading && registerSubmit) {
                                    registerBtnText.textContent = '注 册';
                                    registerLoading.classList.add('hidden');
                                    registerSubmit.disabled = false;
                                    registerSubmit.classList.remove('opacity-80', 'cursor-not-allowed');
                                }
                                return;
                            }
                            
                            // 注册成功
                            const user = data.user;
                            console.log('注册成功:', user);
                            
                            // 显示注册成功通知（更明确的提示）
                            notification.show('注册成功！请查看邮箱并点击验证链接，验证后才能登录', 'info', 8000);
                            
                            // 立即开始表单切换，不等待邮件发送
                            // 更新标签页样式
                            const loginTab = document.getElementById('login-tab');
                            const registerTab = document.getElementById('register-tab');
                            if (loginTab && registerTab) {
                                loginTab.classList.remove('border-transparent', 'bg-blue-500/30');
                                loginTab.classList.add('border-blue-500', 'bg-blue-500/40', 'scale-105');
                                registerTab.classList.remove('border-purple-500', 'bg-purple-500/40');
                                registerTab.classList.add('border-transparent', 'bg-purple-500/30', 'scale-95');
                            }
                            
                            // 切换表单动画
                            const registerForm = document.getElementById('register-form');
                            const loginForm = document.getElementById('login-form');
                            if (registerForm && loginForm) {
                                // 隐藏注册表单
                                registerForm.style.opacity = '0';
                                registerForm.style.transform = 'translateX(20px)';
                                
                                setTimeout(() => {
                                    registerForm.classList.add('hidden');
                                    // 显示登录表单
                                    loginForm.classList.remove('hidden');
                                    loginForm.style.opacity = '0';
                                    loginForm.style.transform = 'translateX(-20px)';
                                    
                                    setTimeout(() => {
                                        loginForm.style.opacity = '1';
                                        loginForm.style.transform = 'translateX(0)';
                                        // 恢复标签页缩放
                                        if (loginTab && registerTab) {
                                            loginTab.classList.remove('scale-105');
                                            registerTab.classList.remove('scale-95');
                                        }
                                    }, 50);
                                }, 100); // 减少延迟时间
                            }
                            
                            // 清空表单
                            document.getElementById('register-email').value = '';
                            document.getElementById('register-password').value = '';
                            
                            // 恢复按钮状态
                            if (registerBtnText && registerLoading && registerSubmit) {
                                registerBtnText.textContent = '注 册';
                                registerLoading.classList.add('hidden');
                                registerSubmit.disabled = false;
                                registerSubmit.classList.remove('opacity-80', 'cursor-not-allowed');
                            }
                            
                            // 登出用户，让用户验证后自行登录
                            // 使用setTimeout延迟登出，避免立即触发onAuthStateChanged
                            setTimeout(() => {
                                auth.signOut().then(() => {
                                    console.log('用户已登出，等待邮箱验证');
                                }).catch((error) => {
                                    // 登出失败不影响用户体验，只在控制台记录
                                    console.error('登出失败:', error);
                                });
                            }, 500); // 减少延迟时间
                        })
                        .catch((error) => {
                            // 使用统一的错误处理函数
                            utils.handleError(error, '注册失败', true);
                            
                            // 恢复按钮状态
                            if (registerBtnText && registerLoading && registerSubmit) {
                                registerBtnText.textContent = '注 册';
                                registerLoading.classList.add('hidden');
                                registerSubmit.disabled = false;
                                registerSubmit.classList.remove('opacity-80', 'cursor-not-allowed');
                            }
                        });
                });
            }
            
            // 注册表单回车键提交
            const registerForm = document.getElementById('register-form');
            if (registerForm) {
                registerForm.addEventListener('keypress', (event) => {
                    if (event.key === 'Enter') {
                        event.preventDefault();
                        const registerSubmit = document.getElementById('register-submit');
                        if (registerSubmit) {
                            registerSubmit.click();
                        }
                    }
                });
            }
            

            

            
            // 注册功能 - 已在上方定义
            
            // 登出按钮点击事件
            if (elements.logoutBtn) {
                elements.logoutBtn.addEventListener('click', () => {
                    const auth = window.supabaseAuth;
                    
                    // 无论是否有认证服务，都执行登出逻辑
                    if (auth) {
                        auth.signOut()
                            .then(() => {
                                console.log('登出成功');
                                
                                // 清理实时数据监听
                                if (window.realtimeChannel) {
                                    try {
                                        window.supabaseClient.channel('course-manager-channel').unsubscribe();
                                        window.realtimeChannel = null;
                                        console.log('已清理实时数据监听');
                                    } catch (error) {
                                        console.error('清理实时数据监听失败:', error);
                                    }
                                }
                                
                                // 隐藏系统框架
                                if (elements.nav && elements.main) {
                                    elements.nav.style.display = 'none';
                                    elements.main.style.display = 'none';
                                }
                                // 重置body透明度
                                document.body.style.opacity = '1';
                                // 显示登录界面
                                updateUIForUnauth();
                                notification.show('登出成功');
                            })
                            .catch((error) => {
                                console.error('登出失败:', error);
                                notification.show('登出失败: ' + error.message, 'error');
                            });
                    } else {
                        // 试用模式下直接登出
                        console.log('试用模式登出');
                        // 隐藏系统框架
                        if (elements.nav && elements.main) {
                            elements.nav.style.display = 'none';
                            elements.main.style.display = 'none';
                        }
                        // 重置body透明度
                        document.body.style.opacity = '1';
                        // 显示登录界面
                        updateUIForUnauth();
                        notification.show('登出成功');
                    }
                });
            }
            
        }
        
        // 更新已登录用户的UI
        function updateUIForAuth(user) {
            // 显示用户信息
            if (elements.userInfo) {
                elements.userInfo.textContent = `${user.email} `;
            }
            
            // 确保登出按钮显示
            if (elements.logoutBtn) {
                elements.logoutBtn.classList.remove('hidden');
            }
            
            // 隐藏登录界面，背景渐隐
            if (elements.authModal) {
                // 先让登录框缩小并淡出
                elements.authContainer.classList.remove('scale-100', 'opacity-100');
                elements.authContainer.classList.add('scale-90', 'opacity-0');
                
                // 然后让背景渐隐
                setTimeout(() => {
                    elements.authModal.style.opacity = '0';
                    setTimeout(() => {
                        elements.authModal.style.display = 'none';
                        elements.authModal.style.pointerEvents = 'none'; // 禁用点击事件
                        // 重置容器状态，为下次显示做准备
                        elements.authContainer.classList.remove('scale-90', 'opacity-0');
                        elements.authContainer.classList.add('scale-95', 'opacity-0');
                    }, 800);
                }, 400);
            }
        }
        
        // 更新未登录用户的UI
        function updateUIForUnauth() {
            // 隐藏系统框架，确保不会显示
            const nav = elements.nav;
            const main = elements.main;
            if (nav && main) {
                nav.style.display = 'none';
                main.style.display = 'none';
            }
            
            // 确保body的opacity为1，否则登录界面也会被隐藏
            const body = document.body;
            if (body) {
                body.style.opacity = '1';
            }
            
            // 清空用户信息
            const userInfo = elements.userInfo;
            if (userInfo) {
                userInfo.textContent = '';
            }
            
            // 确保登出按钮隐藏
            const logoutBtn = elements.logoutBtn;
            if (logoutBtn) {
                logoutBtn.classList.add('hidden');
            }
            
            // 重新初始化 Supabase 服务
            console.log('重新初始化 Supabase 服务');
            
            // 直接尝试重新初始化 Supabase 服务，避免使用函数嵌套
            try {
                if (typeof window.supabase !== 'undefined' && window.supabase.createClient && window.supabaseConfig && window.supabaseConfig.url && window.supabaseConfig.key) {
                    // 检查是否已经存在有效的 Supabase 客户端
                    // 即使在试用模式下，也不要重复创建客户端实例
                    if (!window.supabaseClient || !window.supabaseAuth) {
                        // 检查是否已经有正在初始化的客户端
                        if (!window.supabaseInitializing) {
                            window.supabaseInitializing = true;
                            try {
                                const client = window.supabase.createClient(
                                    window.supabaseConfig.url,
                                    window.supabaseConfig.key,
                                    {
                                        auth: {
                                            storageKey: 'sb-auth-token',
                                            autoRefreshToken: true,
                                            persistSession: true
                                        }
                                    }
                                );
                                window.supabaseClient = client;
                                window.supabaseAuth = client.auth;
                                console.log('Supabase 服务重新初始化成功');
                            } finally {
                                window.supabaseInitializing = false;
                            }
                        } else {
                            console.log('Supabase 服务正在初始化中，跳过重复初始化');
                        }
                    } else {
                        console.log('Supabase 服务已经初始化，跳过重复初始化');
                    }
                } else {
                    console.error('Supabase SDK 未加载或配置缺失');
                }
            } catch (error) {
                console.error('重新初始化 Supabase 服务失败:', error);
                window.supabaseInitializing = false;
            }
            
            // 重置登录按钮状态
            const loginBtnText = elements.loginBtnText;
            const loginLoading = elements.loginLoading;
            const loginSubmit = elements.loginSubmit;
            if (loginBtnText && loginLoading && loginSubmit) {
                loginBtnText.textContent = '登 录';
                loginLoading.classList.add('hidden');
                loginSubmit.disabled = false;
                loginSubmit.classList.remove('opacity-80', 'cursor-not-allowed');
            }
            
            // 重置注册按钮状态
            const registerBtnText = elements.registerBtnText;
            const registerLoading = elements.registerLoading;
            const registerSubmit = elements.registerSubmit;
            if (registerBtnText && registerLoading && registerSubmit) {
                registerBtnText.textContent = '注 册';
                registerLoading.classList.add('hidden');
                registerSubmit.disabled = false;
                registerSubmit.classList.remove('opacity-80', 'cursor-not-allowed');
            }
            
            // 确保登录表单显示，注册表单隐藏
            const loginForm = elements.loginForm;
            const registerForm = elements.registerForm;
            if (loginForm && registerForm) {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
            }
            
            // 显示登录界面，带渐显效果
            const authModal = elements.authModal;
            const authBackground = elements.authBackground;
            const authContainer = elements.authContainer;
            if (authModal && authBackground && authContainer) {
                // 重新启用点击事件
                authModal.style.pointerEvents = 'auto';
                // 重置到初始状态
                authModal.style.opacity = '0';
                authContainer.classList.remove('scale-100', 'opacity-100');
                authContainer.classList.add('scale-95', 'opacity-0');
                // 先设置 display: flex
                authModal.style.display = 'flex';
                // 强制重绘，然后应用动画
                authModal.offsetHeight;
                // 渐显
                authModal.style.opacity = '1';
                authContainer.classList.remove('scale-95', 'opacity-0');
                authContainer.classList.add('scale-100', 'opacity-100');
            }
        }
        

        
        // 页面加载完成后初始化自定义下拉菜单
        document.addEventListener('DOMContentLoaded', initCustomSelects);
    </script>

</body></html>
