            // 生成唯一ID
            generateId: () => `${Date.now().toString(36)}${Math.random().toString(36).slice(2)}`,
            
            // 生成颜色
            generateColor: (text) => {
                // 预定义的美观颜色数组
                const baseColors = [
                    '#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899',
                    '#06b6d4', '#84cc16', '#f97316', '#8b5cf6', '#0891b2', '#d946ef'
                ];
                
                // 使用简单的哈希算法生成索引
                let hash = 0;
                for (let i = 0; i < text.length; i++) {
                    hash = text.charCodeAt(i) + ((hash << 5) - hash);
                }
                
                // 确保索引在有效范围内
                const index = Math.abs(hash) % baseColors.length;
                return baseColors[index];
            },
            
            // 计算课时数
            calculateHours: (startTime, endTime) => {
                const [sh, sm] = startTime.split(':').map(Number);
                const [eh, em] = endTime.split(':').map(Number);
                return (eh * 60 + em - sh * 60 - sm) / 60;
            },
            
            // 保存数据（先保存到本地，再同步到服务器）
            saveData: () => {
                const data = {
                    students: state.students,
                    courses: state.courses,
                    organizations: state.organizations,
                    courseTypes: state.courseTypes,
                    lastUpdated: new Date().toISOString()
                };
                
                // 首先保存到本地
                localStorage.setItem('courseManagerData', JSON.stringify(data));
                console.log('数据保存到localStorage成功');
                
                // 然后同步到服务器
                if (window.firebaseDatabase) {
                    const dbRef = window.firebaseRef(window.firebaseDatabase, 'courseManagerData');
                    window.firebaseSet(dbRef, data).then(() => {
                        console.log('数据同步到服务器成功');
                        notification.show('数据已同步到服务器', 'success');
                    }).catch((error) => {
                        console.error('数据同步到服务器失败:', error);
                        notification.show('数据同步到服务器失败，将在网络恢复后自动同步', 'warning');

            // 从Firebase加载数据并同步
            loadData: () => {

                    courseTypes: []

                    console.log('尝试从服务器加载数据...');
                    const dbRef = window.firebaseRef(window.firebaseDatabase, 'courseManagerData');
                    window.firebaseGet(dbRef).then((snapshot) => {
                        console.log('服务器数据加载成功，快照存在:', snapshot.exists());
                        
                        // 获取本地数据
                        const localDataStr = localStorage.getItem('courseManagerData');
                        const localData = localDataStr ? JSON.parse(localDataStr) : null;
                        const localTimestamp = localData && localData.lastUpdated ? new Date(localData.lastUpdated).getTime() : 0;
                        
                        if (snapshot.exists()) {
                            const serverData = snapshot.val();
                            const serverTimestamp = serverData.lastUpdated ? new Date(serverData.lastUpdated).getTime() : 0;
                            
                            console.log('本地时间戳:', localTimestamp, '服务器时间戳:', serverTimestamp);
                            
                            if (serverTimestamp > localTimestamp) {
                                // 服务器数据较新，使用服务器数据
                                console.log('服务器数据较新，加载服务器数据');
                                state.students = serverData.students || [];
                                state.courses = serverData.courses || [];
                                state.organizations = serverData.organizations || defaults.organizations;
                                state.courseTypes = serverData.courseTypes || defaults.courseTypes;
                                
                                // 保存到本地
                                localStorage.setItem('courseManagerData', JSON.stringify(serverData));
                                console.log('服务器数据已保存到本地');
                                
                                // 显示加载成功的通知
                                notification.show('已同步服务器最新数据', 'success');
                            } else if (localTimestamp > serverTimestamp && localData) {
                                // 本地数据较新，上传到服务器
                                console.log('本地数据较新，上传到服务器');
                                window.firebaseSet(dbRef, localData).then(() => {
                                    console.log('本地数据上传到服务器成功');
                                    state.students = localData.students || [];
                                    state.courses = localData.courses || [];
                                    state.organizations = localData.organizations || defaults.organizations;
                                    state.courseTypes = localData.courseTypes || defaults.courseTypes;
                                    notification.show('本地数据已同步到服务器', 'success');
                                }).catch((error) => {
                                    console.error('本地数据上传到服务器失败:', error);
                                    // 使用本地数据
                                    state.students = localData.students || [];
                                    state.courses = localData.courses || [];
                                    state.organizations = localData.organizations || defaults.organizations;
                                    state.courseTypes = localData.courseTypes || defaults.courseTypes;
                                    notification.show('本地数据上传失败，使用本地数据', 'warning');
                                });
                            } else if (localData) {
                                // 数据时间戳相同，使用本地数据
                                console.log('数据时间戳相同，使用本地数据');
                                state.students = localData.students || [];
                                state.courses = localData.courses || [];
                                state.organizations = localData.organizations || defaults.organizations;
                                state.courseTypes = localData.courseTypes || defaults.courseTypes;
                                notification.show('数据已是最新', 'success');

                                state.courses = [];
                                state.organizations = defaults.organizations;
                                state.courseTypes = defaults.courseTypes;
                                notification.show('初始化默认数据', 'info');
                            }
                        } else if (localData) {
                            // 服务器无数据，本地有数据，上传到服务器
                            console.log('服务器无数据，本地有数据，上传到服务器');
                            window.firebaseSet(dbRef, localData).then(() => {
                                console.log('本地数据上传到服务器成功');
                                state.students = localData.students || [];
                                state.courses = localData.courses || [];
                                state.organizations = localData.organizations || defaults.organizations;
                                state.courseTypes = localData.courseTypes || defaults.courseTypes;
                                notification.show('本地数据已同步到服务器', 'success');
                            }).catch((error) => {
                                console.error('本地数据上传到服务器失败:', error);
                                // 使用本地数据
                                state.students = localData.students || [];
                                state.courses = localData.courses || [];
                                state.organizations = localData.organizations || defaults.organizations;
                                state.courseTypes = localData.courseTypes || defaults.courseTypes;
                                notification.show('本地数据上传失败，使用本地数据', 'warning');

                        } else {
                            // 两边都没有数据，使用默认数据
                            console.log('两边都没有数据，使用默认数据');
                            state.students = [];
                            state.courses = [];
                            state.organizations = defaults.organizations;
                            state.courseTypes = defaults.courseTypes;

                        // 显示加载失败的通知
                        notification.show('从服务器加载数据失败，正在加载本地数据...', 'error');
                        // 失败时从localStorage加载

                        // 从localStorage加载后重新渲染页面

                        render.calendar();

                } else {

                    // 显示加载本地数据的通知
                    notification.show('服务器不可用，正在加载本地数据...', 'warning');

            },
            
            // 导出CSV
            exportCSV: (data, filename) => {
                const headers = Object.keys(data[0]);
                const csvContent = [
                    headers.join(','),
                    ...data.map(row => headers.map(header => {
                        const value = row[header];
                        return typeof value === 'string' && value.includes(',') ? `"${value}"` : value;
                    }).join(','))
                ].join('\n');
                
                const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.setAttribute('href', url);
                link.setAttribute('download', filename);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            },
            
            // 导出统计数据
            exportStatisticsData: (year, month, organization = '') => {
                // 过滤当月课程
                const filteredCourses = state.courses.filter(course => {
                    const courseDate = new Date(course.date);
                    return courseDate.getFullYear() === year && courseDate.getMonth() === month;
                });
                
                const exportData = [];
                
                filteredCourses.forEach(course => {
                    if (course.studentIds && Array.isArray(course.studentIds)) {
                        // 处理多名学生的课程
                        course.studentIds.forEach((studentId, index) => {
                            const student = state.students.find(s => s.id === studentId);
                            if (student) {
                                // 机构筛选
                                if (organization && student.organization !== organization) {
                                    return;
                                }
                                exportData.push({
                                    日期: course.date,
                                    时间: `${course.startTime} - ${course.endTime}`,
                                    学生姓名: student.name,
                                    所属机构: student.organization,
                                    课型: student.courseType,
                                    课时费: student.fee,
                                    备注: course.note || ''
                                });
                            }
                        });
                    } else {
                        // 处理单个学生的课程（兼容旧格式）
                        const student = state.students.find(s => s.id === course.studentId);
                        if (student) {
                            // 机构筛选
                            if (organization && student.organization !== organization) {
                                return;
                            }
                            exportData.push({
                                日期: course.date,
                                时间: `${course.startTime} - ${course.endTime}`,
                                学生姓名: student.name,
                                所属机构: student.organization,
                                课型: student.courseType,
                                课时费: student.fee,
                                备注: course.note || ''
                            });
                        }
                    }
                });
                
                if (exportData.length > 0) {
                    const monthNames = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
                    const filename = `${year}年${monthNames[month]}课时费统计.csv`;
                    utils.exportCSV(exportData, filename);
                    notification.show('数据导出成功');
                } else {
                    notification.show('暂无数据可导出', 'error');
                }
            },
            
            // 导出所有数据
            exportAllData: () => {
                const exportData = {
                    students: state.students,
                    courses: state.courses,
                    organizations: state.organizations,
                    courseTypes: state.courseTypes,
                    exportDate: new Date().toISOString()
                };
                
                const jsonString = JSON.stringify(exportData, null, 2);
                const blob = new Blob([jsonString], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.setAttribute('href', url);
                link.setAttribute('download', `课程系统数据_${new Date().toISOString().split('T')[0]}.json`);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                notification.show('所有数据导出成功');
            },
            
            // 导入数据
            importData: (jsonData) => {
                try {
                    const data = JSON.parse(jsonData);
                    
                    // 导入学生数据
                    if (data.students && Array.isArray(data.students)) {
                        state.students = data.students;
                    }
                    
                    // 导入课程数据
                    if (data.courses && Array.isArray(data.courses)) {
                        state.courses = data.courses;
                    }
                    
                    // 导入机构数据
                    if (data.organizations && Array.isArray(data.organizations)) {
                        state.organizations = data.organizations;
                    }
                    
                    // 导入课型数据
                    if (data.courseTypes && Array.isArray(data.courseTypes)) {
                        state.courseTypes = data.courseTypes;
                    }
                    
                    // 保存数据
                    utils.saveData();
                    
                    return true;
                } catch (error) {
                    console.error('导入数据失败:', error);
                    return false;
                }
            }
        };

        // 渲染函数
        const render = {
            // 渲染日历
            calendar: () => {
                const year = state.currentDate.getFullYear();
                const month = state.currentDate.getMonth();
                
                // 更新月份显示
                document.getElementById('current-month').textContent = `${year}年${month + 1}月`;
                
                // 获取日历网格
                const grid = document.getElementById('calendar-grid');
                grid.innerHTML = '';
                
                // 计算月份数据
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const firstDayOfMonth = new Date(year, month, 1).getDay();
                const today = new Date();
                
                // 添加上个月的日期
                const prevMonth = month === 0 ? 11 : month - 1;
                const prevYear = month === 0 ? year - 1 : year;
                const daysInPrevMonth = new Date(prevYear, prevMonth + 1, 0).getDate();
                
                for (let i = firstDayOfMonth - 1; i >= 0; i--) {
                    const day = daysInPrevMonth - i;
                    const dateStr = `${prevYear}-${String(prevMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const courses = state.courses.filter(c => c.date === dateStr);
                    grid.appendChild(render.createDayCell(day, dateStr, courses, false, false));
                }
                
                // 添加当前月的日期
                for (let day = 1; day <= daysInMonth; day++) {
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const courses = state.courses.filter(c => c.date === dateStr);
                    const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === day;
                    grid.appendChild(render.createDayCell(day, dateStr, courses, true, isToday));
                }
                
                // 添加下个月的日期
                const totalCells = 42;
                const cellsAdded = firstDayOfMonth + daysInMonth;
                const nextMonthCells = totalCells - cellsAdded;
                
                const nextMonth = month === 11 ? 0 : month + 1;
                const nextYear = month === 11 ? year + 1 : year;
                
                for (let day = 1; day <= nextMonthCells; day++) {
                    const dateStr = `${nextYear}-${String(nextMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const courses = state.courses.filter(c => c.date === dateStr);
                    grid.appendChild(render.createDayCell(day, dateStr, courses, false, false));
                }

            createDayCell: (day, dateStr, courses, isCurrentMonth, isToday) => {

                const textClass = isCurrentMonth ? (isToday ? 'text-primary font-bold' : '') : 'text-gray-400';

                    // 按开始时间排序课程

                        return a.startTime.localeCompare(b.startTime);
                    });
                    
                    coursesHTML = sortedCourses.map(course => {
                        // 检查是否是新课程格式（多名学生）
                        if (course.studentIds) {
                            // 使用第一个学生的机构颜色作为课程标签的主色调

                            return `

                                            return `
                                                <span class="px-1 py-0.5 rounded text-xs"

                                </div>

                            const student = state.students.find(s => s.id === course.studentId);
                            const color = student ? utils.generateColor(student.organization) : '#9ca3af';

                                <div class="course-item mt-1 p-1 rounded text-xs" 
                                     style="background-color: ${color}20; border-left: 3px solid ${color};"
                                     onclick="event.stopPropagation(); modal.showCourseDetail('${course.id}')">

                                </div>
                            `;
                        }
                    }).join('');
                }
                
                cell.innerHTML = `
                    <div class="text-right ${textClass}">${day}</div>
                    <div class="mt-1 space-y-1 max-h-[calc(100%-1rem)] overflow-y-auto">
                        ${coursesHTML}
                    </div>

                // 点击添加课程

                    modal.showAddCourse(dateStr);

                return cell;

                `).join('');

                console.log('📊 渲染统计页面:', { year, month, organization, courses: state.courses.length, students: state.students.length });
                
                // 过滤当月课程
                const filteredCourses = state.courses.filter(course => {
                    const courseDate = new Date(course.date);
                    return courseDate.getFullYear() === year && courseDate.getMonth() === month;
                });
                console.log('📊 过滤后课程:', filteredCourses.length);
                
                // 初始化统计数据
                const stats = {
                    totalCourses: 0,
                    totalFee: 0,
                    uniqueStudents: new Set(),
                    byOrganization: {},
                    byCourseType: {},
                    byStudent: {}
                };
                
                // 计算统计数据
                filteredCourses.forEach(course => {
                    stats.totalCourses++;
                    
                    const processStudent = (studentId) => {
                        const student = state.students.find(s => s.id === studentId);
                        if (!student) return;
                        
                        // 机构筛选
                        if (organization && student.organization !== organization) {
                            return;
                        }
                        
                        const fee = student.fee;
                        stats.totalFee += fee;
                        stats.uniqueStudents.add(studentId);
                        
                        // 学生统计
                        if (!stats.byStudent[studentId]) {
                            stats.byStudent[studentId] = {
                                name: student.name,
                                organization: student.organization,
                                courseType: student.courseType,
                                fee: 0,
                                courses: 0
                            };
                        }
                        stats.byStudent[studentId].fee += fee;
                        stats.byStudent[studentId].courses += 1;
                        
                        // 机构统计
                        if (!stats.byOrganization[student.organization]) {
                            stats.byOrganization[student.organization] = { fee: 0, courses: 0, students: new Set() };
                        }
                        stats.byOrganization[student.organization].fee += fee;
                        stats.byOrganization[student.organization].courses += 1;
                        stats.byOrganization[student.organization].students.add(studentId);
                        
                        // 课型统计
                        if (!stats.byCourseType[student.courseType]) {
                            stats.byCourseType[student.courseType] = { fee: 0, courses: 0, students: new Set() };
                        }
                        stats.byCourseType[student.courseType].fee += fee;
                        stats.byCourseType[student.courseType].courses += 1;
                        stats.byCourseType[student.courseType].students.add(studentId);
                    };
                    
                    if (course.studentIds && Array.isArray(course.studentIds)) {
                        console.log('📊 处理多名学生课程:', course.studentIds.length, '名学生');
                        course.studentIds.forEach(processStudent);
                    } else if (course.studentId) {
                        console.log('📊 处理单个学生课程:', course.studentId);
                        processStudent(course.studentId);
                    } else {
                        console.log('📊 跳过无学生课程:', course);
                    }
                });
                
                // 更新统计卡片
                const totalHoursEl = document.getElementById('total-hours');
                const totalFeeEl = document.getElementById('total-fee');
                const totalStudentsEl = document.getElementById('total-students');
                const periodEl = document.getElementById('statistics-period');
                
                if (totalHoursEl) totalHoursEl.textContent = stats.totalCourses;
                if (totalFeeEl) totalFeeEl.textContent = `¥${stats.totalFee.toFixed(2)}`;
                if (totalStudentsEl) totalStudentsEl.textContent = stats.uniqueStudents.size;
                
                const monthNames = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
                if (periodEl) periodEl.textContent = `${year}年${monthNames[month]}（${stats.totalCourses}节课程）`;
                
                // 更新信息
                const orgChartInfo = document.getElementById('organization-chart-info');
                const typeChartInfo = document.getElementById('course-type-chart-info');
                const orgTableInfo = document.getElementById('organization-table-info');
                const typeTableInfo = document.getElementById('course-type-table-info');
                const studentTableInfo = document.getElementById('student-table-info');
                
                if (orgChartInfo) orgChartInfo.textContent = `${Object.keys(stats.byOrganization).length}个机构`;
                if (typeChartInfo) typeChartInfo.textContent = `${Object.keys(stats.byCourseType).length}种课型`;
                if (orgTableInfo) orgTableInfo.textContent = `${Object.keys(stats.byOrganization).length}个机构`;
                if (typeTableInfo) typeTableInfo.textContent = `${Object.keys(stats.byCourseType).length}种课型`;
                if (studentTableInfo) studentTableInfo.textContent = `${stats.uniqueStudents.size}名学生`;
                
                // 渲染图表
                render.chart('organization-chart', stats.byOrganization, '机构课节分布');
                render.chart('course-type-chart', stats.byCourseType, '课型课节分布');
                
                // 渲染表格
                render.orgTable(stats.byOrganization, stats.totalCourses);
                render.typeTable(stats.byCourseType, stats.totalCourses);

                // 如果没有数据，显示空图表

                if (!tableBody) {
                    console.error('Student table not found');
                    return;

                tableBody.innerHTML = '';

                        </td>
                    `;
                    tableBody.appendChild(row);

                }
                
                // 根据排序参数排序
                let sortedData = Object.entries(data);
                switch (sortBy) {
                    case 'fee-desc':
                        sortedData.sort(([,a], [,b]) => b.fee - a.fee);
                        break;
                    case 'fee-asc':
                        sortedData.sort(([,a], [,b]) => a.fee - b.fee);
                        break;
                    case 'courses-desc':
                        sortedData.sort(([,a], [,b]) => b.courses - a.courses);
                        break;
                    case 'courses-asc':
                        sortedData.sort(([,a], [,b]) => a.courses - b.courses);
                        break;
                    default:
                        sortedData.sort(([,a], [,b]) => b.fee - a.fee);
                }
                
                sortedData.forEach(([studentId, stats]) => {

            page: (pageId) => {

        // 模态框管理
        const modal = {
            // 显示模态框
            show: (content) => {
                const container = document.getElementById('modal-container');
                const modalContent = document.getElementById('modal-content');
                
                modalContent.innerHTML = content;
                container.classList.remove('hidden');
                
                // 添加动画
                requestAnimationFrame(() => {
                    modalContent.classList.remove('scale-95', 'opacity-0');
                    modalContent.classList.add('scale-100', 'opacity-100');
                });
                
                // 绑定关闭按钮事件（延迟确保DOM已渲染）
                setTimeout(() => {
                    modalContent.querySelectorAll('.close-modal').forEach(btn => {
                        btn.addEventListener('click', modal.hide);
                    });
                }, 0);
                
                // 点击背景关闭
                container.onclick = (e) => {
                    // 确保点击输入框时不会关闭模态框
                    if (e.target === container && !e.target.closest('input[type="date"]') && !e.target.closest('input[type="time"]')) {
                        modal.hide();
                    }
                };
                
                // ESC键关闭
                document.addEventListener('keydown', modal.handleKeydown);
            },
            
            // 隐藏模态框
            hide: () => {
                const container = document.getElementById('modal-container');
                const modalContent = document.getElementById('modal-content');
                
                modalContent.classList.remove('scale-100', 'opacity-100');
                modalContent.classList.add('scale-95', 'opacity-0');
                
                setTimeout(() => {
                    container.classList.add('hidden');
                }, 300);
                
                // 移除事件监听
                document.removeEventListener('keydown', modal.handleKeydown);

                                确认删除
                            </button>
                        </div>
                    </div>
                `;
                
                modal.show(content);
                
                // 添加按钮事件

                    const cancelBtn = document.getElementById('cancel-confirm');
                    const acceptBtn = document.getElementById('accept-confirm');
                    
                    cancelBtn.addEventListener('click', () => {
                        modal.hide();
                    });

                            onConfirm();
                        }

                    // 添加回车键确认功能

                                <button type="button" class="close-modal px-4 py-2 text-gray-700">关闭</button>
                            </div>
                        </div>
                    </div>
                `;
                
                modal.show(content);
                
                // 自动激活输入框
                setTimeout(() => {
                    document.getElementById('new-course-type').focus();
                }, 100);
                
                // 添加课型
                document.getElementById('add-course-type').addEventListener('click', () => {
                    const newType = document.getElementById('new-course-type').value.trim();
                    if (newType && !state.courseTypes.includes(newType)) {
                        state.courseTypes.push(newType);
                        utils.saveData();
                        modal.showManageCourseTypes(); // 重新渲染
                        notification.show('课型添加成功');
                    }
                });
                
                // 回车键添加课型
                document.getElementById('new-course-type').addEventListener('keypress', (event) => {
                    if (event.key === 'Enter') {
                        document.getElementById('add-course-type').click();
                    }
                });
                
                // 删除课型
                document.querySelectorAll('.delete-course-type').forEach(button => {
                    button.addEventListener('click', () => {
                        const type = button.dataset.type;
                        const usedByStudents = state.students.some(s => s.courseType === type);
                        if (usedByStudents) {
                            notification.show('该课型正在被使用，无法删除', 'error');
                            return;
                        }
                        state.courseTypes = state.courseTypes.filter(t => t !== type);
                        utils.saveData();
                        modal.showManageCourseTypes(); // 重新渲染
                        notification.show('课型删除成功');
                    });
                });
            },
            
            // 显示删除学生模态框
            showDeleteStudent: (student) => {
                const content = `
                    <div class="p-6">
                        <div class="text-center mb-6">
                            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-red-100 text-red-500 mb-4">
                                <i class="fa fa-exclamation-triangle text-2xl"></i>
                            </div>
                            <h3 class="text-lg font-medium text-gray-900 mb-2">确认删除</h3>
                            <p class="text-gray-600 mb-2">确定要删除学生 <strong>${student.name}</strong> 吗？</p>
                            <p class="text-sm text-gray-500">删除后，该学生的所有课程信息也将被删除，不可撤销！</p>
                        </div>
                        <div class="flex space-x-3">
                            <button id="cancel-confirm" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition-colors">
                                取消
                            </button>
                            <button id="accept-confirm" class="flex-1 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors">
                                确认删除
                            </button>
                        </div>
                    </div>
                `;
                
                modal.show(content);
                
                // 添加按钮事件
                setTimeout(() => {
                    const cancelBtn = document.getElementById('cancel-confirm');
                    const acceptBtn = document.getElementById('accept-confirm');
                    
                    cancelBtn.addEventListener('click', () => {
                        modal.hide();
                    });
                    
                    acceptBtn.addEventListener('click', () => {
                        // 删除相关课程（处理新旧两种格式）
                        state.courses = state.courses.filter(course => {
                            // 新格式：studentIds 数组
                            if (course.studentIds && Array.isArray(course.studentIds)) {
                                return !course.studentIds.includes(student.id);
                            }
                            // 旧格式：单个 studentId
                            return course.studentId !== student.id;
                        });
                        
                        // 删除学生
                        state.students = state.students.filter(s => s.id !== student.id);
                        
                        utils.saveData();
                        render.students();
                        render.calendar();
                        modal.hide();
                        
                        notification.show('学生删除成功');
                    });
                    
                    // 添加回车键确认功能
                    document.addEventListener('keydown', (event) => {
                        if (event.key === 'Enter') {
                            acceptBtn.click();
                        } else if (event.key === 'Escape') {
                            cancelBtn.click();
                        }
                    });
                }, 0);
            }
        };

        // 处理时间输入框的键盘事件
        function handleTimeInputKeydown(event, currentId, otherId) {
            if (event.key === 'ArrowRight' || event.key === 'ArrowLeft') {
                event.preventDefault();
                document.getElementById(otherId).focus();
            }
        }

        // 通知系统
        const notification = {
            // 显示通知
            show: (message, type = 'success') => {
                const el = document.getElementById('notification');
                const icon = document.getElementById('notification-icon');
                const msgEl = document.getElementById('notification-message');
                
                const icons = {
                    error: { icon: 'fa-exclamation-circle', class: 'text-danger' },
                    warning: { icon: 'fa-exclamation-triangle', class: 'text-warning' },
                    success: { icon: 'fa-check-circle', class: 'text-success' }
                };
                const config = icons[type] || icons.success;
                
                icon.innerHTML = `<i class="fa ${config.icon} text-xl"></i>`;
                icon.className = `flex-shrink-0 ${config.class}`;
                msgEl.textContent = message;
                
                // 显示通知
                el.classList.remove('translate-x-full', 'opacity-0');
                
                // 自动隐藏
                setTimeout(() => el.classList.add('translate-x-full', 'opacity-0'), 3000);
            }
        };

        // 事件监听
        const events = {
            // 初始化事件监听
            init: () => {
                // 导航切换
                document.querySelectorAll('[data-page]').forEach(button => {
                    button.addEventListener('click', function(e) {
                        e.preventDefault();
                        const pageId = this.dataset.page;
                        render.page(pageId);
                    });
                });
                
                // 月份导航
                document.getElementById('prev-month').addEventListener('click', () => {
                    // 使用更可靠的方式创建新日期
                    const year = state.currentDate.getFullYear();
                    const month = state.currentDate.getMonth();
                    // 直接创建新日期，避免 setMonth 的副作用
                    const newDate = new Date(year, month - 1, 1);
                    state.currentDate = newDate;
                    render.calendar();
                });
                
                document.getElementById('next-month').addEventListener('click', () => {
                    // 使用更可靠的方式创建新日期
                    const year = state.currentDate.getFullYear();
                    const month = state.currentDate.getMonth();
                    // 直接创建新日期，避免 setMonth 的副作用
                    const newDate = new Date(year, month + 1, 1);
                    state.currentDate = newDate;
                    render.calendar();
                });
                
                // 添加课程按钮
                document.getElementById('add-course-btn').addEventListener('click', () => {
                    const today = new Date();
                    const dateStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
                    modal.showAddCourse(dateStr);
                });
                
                // 添加学生按钮
                document.getElementById('add-student-btn').addEventListener('click', () => {
                    modal.showAddStudent();
                });
                
                // 机构管理按钮
                document.getElementById('manage-organizations-btn').addEventListener('click', () => {
                    modal.showManageOrganizations();
                });
                
                // 课型管理按钮
                document.getElementById('manage-course-types-btn').addEventListener('click', () => {
                    modal.showManageCourseTypes();
                });
                
                // 学生搜索
                document.getElementById('student-search').addEventListener('input', () => {
                    render.students();
                });
                
                // 统计页面年份选择
                const yearSelect = document.getElementById('statistics-year');
                const currentYear = new Date().getFullYear();
                for (let year = currentYear - 5; year <= currentYear + 5; year++) {
                    const option = document.createElement('option');
                    option.value = year;
                    option.textContent = `${year}年`;
                    if (year === currentYear) {
                        option.selected = true;
                    }
                    yearSelect.appendChild(option);
                }
                
                // 统计页面月份选择
                const monthSelect = document.getElementById('statistics-month');
                monthSelect.value = new Date().getMonth();
                
                // 统计页面筛选
                yearSelect.addEventListener('change', () => {
                    const year = parseInt(yearSelect.value);
                    const month = parseInt(monthSelect.value);
                    const organization = document.getElementById('statistics-organization')?.value || '';
                    render.statistics(year, month, organization);
                });
                
                monthSelect.addEventListener('change', () => {
                    const year = parseInt(yearSelect.value);
                    const month = parseInt(monthSelect.value);
                    const organization = document.getElementById('statistics-organization')?.value || '';
                    render.statistics(year, month, organization);
                });
                
                // 学生排序
                const studentSortSelect = document.getElementById('student-sort');
                if (studentSortSelect) {
                    studentSortSelect.addEventListener('change', () => {
                        const year = parseInt(yearSelect.value);
                        const month = parseInt(monthSelect.value);
                        const organization = document.getElementById('statistics-organization')?.value || '';
                        render.statistics(year, month, organization);
                    });
                }
                
                // 机构选择
                const organizationSelect = document.getElementById('statistics-organization');
                if (organizationSelect) {
                    // 初始化机构选项
                    organizationSelect.innerHTML = '<option value="">全部机构</option>';
                    state.organizations.forEach(org => {
                        const option = document.createElement('option');
                        option.value = org;
                        option.textContent = org;
                        organizationSelect.appendChild(option);
                    });
                    
                    // 添加事件监听器
                    organizationSelect.addEventListener('change', () => {
                        const year = parseInt(yearSelect.value);
                        const month = parseInt(monthSelect.value);
                        const organization = organizationSelect.value;
                        render.statistics(year, month, organization);
                    });
                }
                
                // 导出统计数据
                document.getElementById('export-statistics').addEventListener('click', () => {
                    const year = parseInt(yearSelect.value);
                    const month = parseInt(monthSelect.value);
                    const organization = document.getElementById('statistics-organization')?.value || '';
                    utils.exportStatisticsData(year, month, organization);
                });
            }
        };

        // 初始化应用
        function init() {
            // 初始化事件监听
            events.init();
            
            // 渲染初始页面框架
            render.page('calendar-page');
            
            // 加载数据（会自动重新渲染页面）
            console.log('开始加载数据...');
            utils.loadData();
            
            // 添加Firebase实时监听
            if (window.firebaseDatabase) {
                const dbRef = window.firebaseRef(window.firebaseDatabase, 'courseManagerData');
                window.firebaseOnValue(dbRef, (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        console.log('收到Firebase实时更新:', data);
                        // 简化数据比较，确保即使微小变化也能触发更新
                        const hasChanged = 
                            JSON.stringify(data.students) !== JSON.stringify(state.students) ||
                            JSON.stringify(data.courses) !== JSON.stringify(state.courses) ||
                            JSON.stringify(data.organizations) !== JSON.stringify(state.organizations) ||
                            JSON.stringify(data.courseTypes) !== JSON.stringify(state.courseTypes);
                        
                        if (hasChanged) {
                            state.students = data.students || [];
                            state.courses = data.courses || [];
                            state.organizations = data.organizations || [];
                            state.courseTypes = data.courseTypes || [];
                            console.log('数据从Firebase实时更新，重新渲染页面');
                            // 重新渲染页面
                            render.students();
                            render.calendar();
                            const yearSelect = document.getElementById('statistics-year');
                            const monthSelect = document.getElementById('statistics-month');
                            const organizationSelect = document.getElementById('statistics-organization');
                            if (yearSelect && monthSelect) {
                                const year = parseInt(yearSelect.value);
                                const month = parseInt(monthSelect.value);
                                const organization = organizationSelect ? organizationSelect.value : '';
                                render.statistics(year, month, organization);
                            }
                        }
                    }
                });
            }
            
            // 如果没有学生数据，显示引导提示
            setTimeout(() => {
                if (state.students.length === 0) {
                    notification.show('欢迎使用课程管理系统，请先添加学生信息', 'info');
                }
            }, 2000);
        }

        // 启动应用
        init();
        
        // 程序关闭前同步数据
        window.addEventListener('beforeunload', function() {
            // 只在Firebase可用时执行
            if (window.firebaseDatabase) {
                try {
                    // 获取本地数据
                    const localDataStr = localStorage.getItem('courseManagerData');
                    const localData = localDataStr ? JSON.parse(localDataStr) : null;
                    const localTimestamp = localData && localData.lastUpdated ? new Date(localData.lastUpdated).getTime() : 0;
                    
                    if (localTimestamp > 0) {
                        // 比较服务器数据时间戳
                        const dbRef = window.firebaseRef(window.firebaseDatabase, 'courseManagerData');
                        window.firebaseGet(dbRef).then((snapshot) => {
                            if (snapshot.exists()) {
                                const serverData = snapshot.val();
                                const serverTimestamp = serverData.lastUpdated ? new Date(serverData.lastUpdated).getTime() : 0;
                                
                                // 如果本地数据较新，同步到服务器
                                if (localTimestamp > serverTimestamp) {
                                    window.firebaseSet(dbRef, localData).then(() => {
                                        console.log('程序关闭前，本地数据已同步到服务器');
                                    }).catch((error) => {
                                        console.error('程序关闭前同步数据失败:', error);
                                    });
                                } else {
                                    console.log('服务器数据较新，无需同步');
                                }
                            } else {
                                // 服务器无数据，上传本地数据
                                window.firebaseSet(dbRef, localData).then(() => {
                                    console.log('程序关闭前，本地数据已上传到服务器');
                                }).catch((error) => {
                                    console.error('程序关闭前上传数据失败:', error);
                                });
                            }
                        }).catch((error) => {
                            console.error('获取服务器数据失败:', error);
                        });
                    }
                } catch (error) {
                    console.error('同步数据时出错:', error);
                }
            }
        });
    </script>

</body></html>
