    <!-- 统计控制器 -->

    
    <script>
        // 全局状态管理
        const state = {
            currentDate: new Date(),
            currentYear: new Date().getFullYear(),
            currentMonth: new Date().getMonth(),
            students: [],
            courses: [],
            organizations: []
        };

        // 工具函数
        const utils = {
            // 生成唯一ID
            generateId: () => `${Date.now().toString(36)}${Math.random().toString(36).slice(2)}`,
            
            // 转义HTML特殊字符，防止XSS攻击
            escapeHtml: (unsafe) => {
                if (!unsafe) return '';
                return unsafe
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            },
            
            // 生成颜色
            generateColor: (text) => {
                // 预定义的美观颜色数组
                const baseColors = [
                    '#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899',
                    '#06b6d4', '#84cc16', '#f97316', '#8b5cf6', '#0891b2', '#d946ef'
                ];
                
                // 使用简单的哈希算法生成索引
                let hash = 0;
                for (let i = 0; i < text.length; i++) {
                    hash = text.charCodeAt(i) + ((hash << 5) - hash);
                }
                
                // 确保索引在有效范围内
                const index = Math.abs(hash) % baseColors.length;
                return baseColors[index];
            },
            
            // 获取统计页面参数
            getStatisticsParams: () => {
                const yearValue = getCustomSelectValue('statistics-year-wrapper');
                const monthValue = getCustomSelectValue('statistics-month-wrapper');
                const organizationValue = getCustomSelectValue('statistics-organization-wrapper');
                const year = yearValue ? parseInt(yearValue) : new Date().getFullYear();
                const month = monthValue ? parseInt(monthValue) : new Date().getMonth();
                const organization = organizationValue || '';
                return { year, month, organization };
            },
            
            // 计算课时数
            calculateHours: (startTime, endTime) => {
                const [sh, sm] = startTime.split(':').map(Number);
                const [eh, em] = endTime.split(':').map(Number);
                return (eh * 60 + em - sh * 60 - sm) / 60;
            },
            
            // 更新同步状态
            updateSyncStatus: (status, message) => {
                const syncStatus = document.getElementById('sync-status');
                const syncIcon = document.getElementById('sync-icon');
                const syncText = document.getElementById('sync-text');
                
                if (syncStatus && syncIcon && syncText) {
                    switch (status) {
                        case 'syncing':
                            syncIcon.className = 'text-blue-500 animate-spin';
                            syncIcon.innerHTML = '<i class="fa fa-spinner"></i>';
                            syncText.className = 'text-blue-500';
                            syncText.textContent = message || '正在同步...';
                            break;
                        case 'success':
                            syncIcon.className = 'text-green-500';
                            syncIcon.innerHTML = '<i class="fa fa-check-circle"></i>';
                            syncText.className = 'text-green-500';
                            syncText.textContent = message || '同步成功';
                            break;
                        case 'error':
                            syncIcon.className = 'text-red-500';
                            syncIcon.innerHTML = '<i class="fa fa-exclamation-circle"></i>';
                            syncText.className = 'text-red-500';
                            syncText.textContent = message || '同步失败';
                            break;
                        default:
                            syncIcon.className = 'text-gray-500';
                            syncIcon.innerHTML = '<i class="fa fa-cloud"></i>';
                            syncText.className = 'text-gray-500';
                            syncText.textContent = '未同步';
                    }
                }
            },
            
            // 保存数据（先保存到本地，再同步到服务器）
            saveData: () => {
                const data = {
                    students: state.students,
                    courses: state.courses,
                    organizations: state.organizations,
                    lastUpdated: new Date().toISOString()
                };
                
                // 首先保存到本地
                localStorage.setItem('courseManagerData', JSON.stringify(data));
                console.log('数据保存到localStorage成功');
                
                // 本地数据改变，将同步状态设置为未同步
                utils.updateSyncStatus('default', '未同步');
                
                // 然后同步到服务器（仅当用户已登录时）
                const auth = window.firebaseAuth;
                if (window.firebaseDatabase && auth && auth.currentUser) {
                    utils.updateSyncStatus('syncing', '正在同步...');
                    const userId = auth.currentUser.uid;
                    const dbRef = window.firebaseRef(window.firebaseDatabase, `courseManagerData/${userId}`);
                    window.firebaseSet(dbRef, data).then(() => {
                        console.log('数据同步到服务器成功');
                        utils.updateSyncStatus('success', '同步成功');
                    }).catch((error) => {
                        console.error('数据同步到服务器失败:', error);
                        utils.updateSyncStatus('error', '同步失败');
                    });
                } else {
                    console.log('用户未登录或服务器不可用，数据仅保存到本地');
                    utils.updateSyncStatus('default', '未登录');
                }
            },
            
            // 从Firebase加载数据并同步
            loadData: () => {
                const defaults = {
                    organizations: []
                };
                
                console.log('开始加载数据，Firebase Database:', window.firebaseDatabase);
                
                // 检查用户是否已登录
                const auth = window.firebaseAuth;
                const isLoggedIn = auth && auth.currentUser;
                
                if (window.firebaseDatabase && isLoggedIn) {
                    // 显示正在从服务器加载数据的状态
                    utils.updateSyncStatus('syncing', '正在同步...');
                    console.log('用户已登录，尝试从服务器加载数据...');
                    const userId = auth.currentUser.uid;
                    const dbRef = window.firebaseRef(window.firebaseDatabase, `courseManagerData/${userId}`);
                    window.firebaseGet(dbRef).then((snapshot) => {
                        console.log('服务器数据加载成功，快照存在:', snapshot.exists());
                        
                        // 获取本地数据
                        const localDataStr = localStorage.getItem('courseManagerData');
                        const localData = localDataStr ? JSON.parse(localDataStr) : null;
                        const localTimestamp = localData && localData.lastUpdated ? new Date(localData.lastUpdated).getTime() : 0;
                        
                        if (snapshot.exists()) {
                            const serverData = snapshot.val();
                            const serverTimestamp = serverData.lastUpdated ? new Date(serverData.lastUpdated).getTime() : 0;
                            
                            console.log('本地时间戳:', localTimestamp, '服务器时间戳:', serverTimestamp);
                            
                            if (localData) {
                                // 本地有数据，比较数据是否不同
                                const hasChanged = 
                                    JSON.stringify(localData.students) !== JSON.stringify(serverData.students) ||
                                    JSON.stringify(localData.courses) !== JSON.stringify(serverData.courses) ||
                                    JSON.stringify(localData.organizations) !== JSON.stringify(serverData.organizations);
                                
                                if (hasChanged) {
                                    // 数据不同，显示比较界面
                                    console.log('检测到数据不同，显示比较界面');
                                    modal.showDataConflict(localData, serverData);
                                    utils.updateSyncStatus('success', '同步成功');
                                } else {
                                    // 数据相同，使用本地数据
                                    console.log('数据相同，使用本地数据');
                                    state.students = localData.students || [];
                                    state.courses = localData.courses || [];
                                    state.organizations = localData.organizations || defaults.organizations;
                                    utils.updateSyncStatus('success', '同步成功');
                                    
                                    // 数据加载完成后重新渲染页面
                                    render.students();
                                    render.calendar();
                                    const { year, month, organization } = utils.getStatisticsParams();
                                    render.statistics(year, month, organization);
                                }
                            } else {
                                // 本地无数据，使用服务器数据
                                console.log('本地无数据，使用服务器数据');
                                state.students = serverData.students || [];
                                state.courses = serverData.courses || [];
                                state.organizations = serverData.organizations || defaults.organizations;
                                
                                // 保存到本地
                                localStorage.setItem('courseManagerData', JSON.stringify(serverData));
                                console.log('服务器数据已保存到本地');
                                
                                utils.updateSyncStatus('success', '同步成功');
                                
                                // 数据加载完成后重新渲染页面
                                render.students();
                                render.calendar();
                                const { year, month, organization } = utils.getStatisticsParams();
                                render.statistics(year, month, organization);
                            }
                        } else if (localData) {
                            // 服务器无数据，本地有数据，上传到服务器
                            console.log('服务器无数据，本地有数据，上传到服务器');
                            window.firebaseSet(dbRef, localData).then(() => {
                                console.log('本地数据上传到服务器成功');
                                state.students = localData.students || [];
                                state.courses = localData.courses || [];
                                state.organizations = localData.organizations || defaults.organizations;
                                utils.updateSyncStatus('success', '同步成功');
                                
                                // 数据加载完成后重新渲染页面
                                render.students();
                                render.calendar();
                                const { year, month, organization } = utils.getStatisticsParams();
                                render.statistics(year, month, organization);
                            }).catch((error) => {
                                console.error('本地数据上传到服务器失败:', error);
                                // 使用本地数据
                                state.students = localData.students || [];
                                state.courses = localData.courses || [];
                                state.organizations = localData.organizations || defaults.organizations;
                                utils.updateSyncStatus('error', '同步失败');
                                
                                // 数据加载完成后重新渲染页面
                                render.students();
                                render.calendar();
                                const { year, month, organization } = utils.getStatisticsParams();
                                render.statistics(year, month, organization);
                            });
                        } else {
                            // 两边都没有数据，使用默认数据
                            console.log('两边都没有数据，使用默认数据');
                            state.students = [];
                            state.courses = [];
                            state.organizations = defaults.organizations;
                            utils.updateSyncStatus('success', '同步成功');
                            
                            // 数据加载完成后重新渲染页面
                            render.students();
                            render.calendar();
                            const yearValue = getCustomSelectValue('statistics-year-wrapper');
                            const monthValue = getCustomSelectValue('statistics-month-wrapper');
                            const organizationValue = getCustomSelectValue('statistics-organization-wrapper');
                            const year = yearValue ? parseInt(yearValue) : new Date().getFullYear();
                            const month = monthValue ? parseInt(monthValue) : new Date().getMonth();
                            const organization = organizationValue || '';
                            render.statistics(year, month, organization);
                        }
                    }).catch((error) => {
                        console.error('从服务器加载数据失败:', error);
                        // 显示加载失败的状态
                        utils.updateSyncStatus('error', '同步失败');
                        // 失败时从localStorage加载
                        utils.loadFromLocalStorage();
                        // 从localStorage加载后重新渲染页面
                        render.students();
                        render.calendar();
                        const yearValue = getCustomSelectValue('statistics-year-wrapper');
                        const monthValue = getCustomSelectValue('statistics-month-wrapper');
                        const organizationValue = getCustomSelectValue('statistics-organization-wrapper');
                        const year = yearValue ? parseInt(yearValue) : new Date().getFullYear();
                        const month = monthValue ? parseInt(monthValue) : new Date().getMonth();
                        const organization = organizationValue || '';
                        render.statistics(year, month, organization);
                    });
                } else {
                    // 用户未登录或服务器不可用，从localStorage加载
                    if (!isLoggedIn) {
                        console.log('用户未登录，从localStorage加载');
                        utils.updateSyncStatus('default', '未登录');
                    } else {
                        console.log('服务器不可用，从localStorage加载');
                        utils.updateSyncStatus('error', '服务器不可用');
                    }
                    // 从localStorage加载
                    utils.loadFromLocalStorage();
                    // 从localStorage加载后重新渲染页面
                    render.students();
                    render.calendar();
                }
            },
            
            // 从localStorage加载数据（备用方法）
            loadFromLocalStorage: () => {
                const defaults = {
                    organizations: []
                };
                
                try {
                    const data = localStorage.getItem('courseManagerData');
                    const parsed = data ? JSON.parse(data) : {};
                    
                    state.students = parsed.students || [];
                    state.courses = parsed.courses || [];
                    state.organizations = parsed.organizations || defaults.organizations;
                    console.log('数据从localStorage加载成功');
                    // 显示加载本地数据成功的通知
                    notification.show('本地数据加载成功', 'success');
                } catch (error) {
                    console.error('加载数据失败:', error);
                    // 使用默认数据
                    state.students = [];
                    state.courses = [];
                    state.organizations = defaults.organizations;
                    // 显示加载本地数据失败的通知
                    notification.show('本地数据加载失败，使用默认数据', 'error');
                }
            },
            
            // 导出CSV
            exportCSV: (data, filename) => {
                const headers = Object.keys(data[0]);
                const csvContent = [
                    headers.join(','),
                    ...data.map(row => headers.map(header => {
                        const value = row[header];
                        return typeof value === 'string' && value.includes(',') ? `"${value}"` : value;
                    }).join(','))
                ].join('\n');
                
                const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.setAttribute('href', url);
                link.setAttribute('download', filename);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            },
            
            // 导出HTML
            exportHTML: (data, filename, year, month, organization) => {
                const monthNames = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
                const monthName = monthNames[month];
                const title = `${year}年${monthName}课时费统计`;
                
                // 生成HTML内容
                let htmlContent = `
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${title}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;

                `;
                
                // 创建并下载HTML文件
                const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8;' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.setAttribute('href', url);

                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            },
            
            // 导出统计数据
            exportStatisticsData: (year, month, organization = '') => {
                // 过滤当月课程
                const filteredCourses = state.courses.filter(course => {
                    const courseDate = new Date(course.date);
                    return courseDate.getFullYear() === year && courseDate.getMonth() === month;
                });
                
                const exportData = [];
                
                // 计算机构详细数据
                const organizationStats = {};
                
                // 计算课型详细分布数据
                const detailedStats = {
                    '一对一': {},
                    '多人课': {}
                };
                
                filteredCourses.forEach(course => {
                    const courseLessonType = course.lessonType || '一对一';
                    const isGroupLesson = courseLessonType === '多人课';
                    
                    const processStudent = (studentId, index) => {
                        const student = state.students.find(s => s.id === studentId);
                        if (!student) return;
                        
                        // 机构筛选
                        if (organization && student.organization !== organization) {
                            return;
                        }
                        
                        // 导出基本课程数据
                        exportData.push({
                            日期: course.date,
                            时间: `${course.startTime} - ${course.endTime}`,
                            学生姓名: student.name,
                            所属机构: student.organization,
                            年级: student.grade || '未设置',
                            课型: courseLessonType,
                            上课人数: course.studentIds ? course.studentIds.length : 1,
                            课时费: isGroupLesson ? 
                                (course.fees && course.fees[0] !== undefined ? course.fees[0] : 0) : 
                                (course.fees && course.fees[index] !== undefined ? course.fees[index] : 
                                (student.fees?.['一对一'] || student.fee || 0)),
                            备注: course.note || ''
                        });
                        
                        // 统计机构详细数据
                        const org = student.organization || '未分配';
                        if (!organizationStats[org]) {
                            organizationStats[org] = {
                                courses: 0,
                                fee: 0,
                                students: new Set()
                            };
                        }
                        organizationStats[org].students.add(studentId);
                        
                        // 对于多人课，只在第一个学生时累加课程数和费用
                        // 对于一对一课程，只有一个学生，直接累加
                        const shouldCountCourse = isGroupLesson ? index === 0 : true;
                        if (shouldCountCourse) {
                            organizationStats[org].courses += 1;
                            const courseFee = isGroupLesson ? 
                                (course.fees && course.fees[0] !== undefined ? course.fees[0] : 0) : 
                                (course.fees && course.fees[index] !== undefined ? course.fees[index] : 
                                (student.fees?.['一对一'] || student.fee || 0));
                            organizationStats[org].fee += courseFee;
                        }
                        
                        // 统计详细数据
                        if (courseLessonType === '一对一') {
                            const grade = student.grade || '未设置';
                            
                            if (!detailedStats['一对一'][grade]) {
                                detailedStats['一对一'][grade] = {};
                            }
                            if (!detailedStats['一对一'][grade][org]) {
                                detailedStats['一对一'][grade][org] = {
                                    courses: 0,
                                    fee: 0,
                                    students: new Set()
                                };
                            }
                            detailedStats['一对一'][grade][org].courses += 1;
                            detailedStats['一对一'][grade][org].fee += course.fees && course.fees[index] !== undefined ? course.fees[index] : 
                                (student.fees?.['一对一'] || student.fee || 0);
                            detailedStats['一对一'][grade][org].students.add(studentId);
                        } else if (courseLessonType === '多人课') {
                            const grade = student.grade || '未设置';
                            const studentCount = course.studentIds ? course.studentIds.length : 1;
                            
                            if (!detailedStats['多人课'][studentCount]) {
                                detailedStats['多人课'][studentCount] = {};
                            }
                            if (!detailedStats['多人课'][studentCount][grade]) {
                                detailedStats['多人课'][studentCount][grade] = {};
                            }
                            if (!detailedStats['多人课'][studentCount][grade][org]) {
                                detailedStats['多人课'][studentCount][grade][org] = {
                                    courses: 0,
                                    fee: 0,
                                    students: new Set()
                                };
                            }
                            if (index === 0) {
                                const groupFee = course.fees && course.fees[0] !== undefined ? course.fees[0] : 0;
                                detailedStats['多人课'][studentCount][grade][org].courses += 1;
                                detailedStats['多人课'][studentCount][grade][org].fee += groupFee;
                            }
                            detailedStats['多人课'][studentCount][grade][org].students.add(studentId);
                        }
                    };
                    
                    if (course.studentIds && Array.isArray(course.studentIds)) {
                        course.studentIds.forEach((studentId, index) => processStudent(studentId, index));
                    } else if (course.studentId) {
                        processStudent(course.studentId, 0);
                    }
                });
                
                // 添加机构详细数据到导出数据
                exportData.push({}); // 空行分隔
                exportData.push({ 日期: '机构详细数据' }); // 标题
                exportData.push({ 日期: '机构', 时间: '课节数', 学生姓名: '课时费', 所属机构: '学生数', 年级: '占比' });
                
                const totalCourses = Object.values(organizationStats).reduce((sum, stats) => sum + stats.courses, 0);
                Object.entries(organizationStats).sort(([,a], [,b]) => b.courses - a.courses).forEach(([org, stats]) => {
                    const pct = totalCourses > 0 ? (stats.courses / totalCourses * 100) : 0;
                    exportData.push({
                        日期: org,
                        时间: stats.courses,
                        学生姓名: stats.fee.toFixed(2),
                        所属机构: stats.students.size,
                        年级: pct.toFixed(1) + '%'
                    });
                });
                
                // 添加课型详细分布数据到导出数据
                exportData.push({}); // 空行分隔
                exportData.push({ 日期: '课型详细分布' }); // 标题
                exportData.push({}); // 空行
                
                // 添一对一课程详细分布
                exportData.push({ 日期: '一对一课程详细分布' });
                exportData.push({ 日期: '机构', 时间: '年级', 学生姓名: '学生数', 所属机构: '课节数', 年级: '课时费' });
                
                const orgGradeStats = {};
                Object.entries(detailedStats['一对一']).forEach(([grade, orgStats]) => {
                    Object.entries(orgStats).forEach(([org, stats]) => {
                        if (!orgGradeStats[org]) {
                            orgGradeStats[org] = {};
                        }
                        orgGradeStats[org][grade] = stats;
                    });
                });
                
                Object.entries(orgGradeStats).sort(([orgA], [orgB]) => orgA.localeCompare(orgB)).forEach(([org, gradeStats]) => {
                    Object.entries(gradeStats).forEach(([grade, stats]) => {
                        exportData.push({
                            日期: org,
                            时间: grade,
                            学生姓名: stats.students.size,
                            所属机构: stats.courses,
                            年级: stats.fee.toFixed(2)
                        });
                    });
                });
                
                exportData.push({}); // 空行
                
                // 添加多人课课程详细分布
                exportData.push({ 日期: '多人课课程详细分布' });
                exportData.push({ 日期: '机构', 时间: '年级', 学生姓名: '上课人数', 所属机构: '课节数', 年级: '课时费' });
                
                const orgGradeCountStats = {};
                Object.entries(detailedStats['多人课']).forEach(([studentCount, gradeStats]) => {
                    Object.entries(gradeStats).forEach(([grade, orgStats]) => {
                        Object.entries(orgStats).forEach(([org, stats]) => {
                            if (!orgGradeCountStats[org]) {
                                orgGradeCountStats[org] = {};
                            }
                            if (!orgGradeCountStats[org][grade]) {
                                orgGradeCountStats[org][grade] = {};
                            }
                            orgGradeCountStats[org][grade][studentCount] = stats;
                        });
                    });
                });
                
                Object.entries(orgGradeCountStats).sort(([orgA], [orgB]) => orgA.localeCompare(orgB)).forEach(([org, gradeStats]) => {
                    Object.entries(gradeStats).forEach(([grade, countStats]) => {
                        Object.entries(countStats).sort(([countA], [countB]) => parseInt(countA) - parseInt(countB)).forEach(([studentCount, stats]) => {
                            exportData.push({
                                日期: org,
                                时间: grade,
                                学生姓名: studentCount,
                                所属机构: stats.courses,
                                年级: stats.fee.toFixed(2)
                            });
                        });
                    });
                });
                
                if (exportData.length > 0) {
                    const monthNames = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
                    const monthName = monthNames[month];
                    
                    // 导出为HTML格式
                    const htmlFilename = `${year}年${monthName}课时费统计.html`;
                    utils.exportHTML(exportData, htmlFilename, year, month, organization);
                    
                    notification.show('数据导出成功（HTML格式）');
                } else {
                    notification.show('暂无数据可导出', 'error');
                }
            },
            
            // 导出所有数据
            exportAllData: () => {
                try {
                    const exportData = {
                        students: state.students,
                        courses: state.courses,
                        organizations: state.organizations,
                        exportDate: new Date().toISOString()
                    };
                    
                    const jsonString = JSON.stringify(exportData, null, 2);
                    const blob = new Blob([jsonString], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.setAttribute('href', url);
                    link.setAttribute('download', `课程系统数据_${new Date().toISOString().split('T')[0]}.json`);
                    link.style.visibility = 'hidden';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    notification.show('数据导出成功');
                } catch (error) {
                    console.error('导出数据失败:', error);
                    notification.show('导出数据失败: ' + error.message, 'error');
                }
            },
            

        };

        // 渲染函数
        const render = {
            // 渲染日历
            calendar: () => {
                const year = state.currentDate.getFullYear();
                const month = state.currentDate.getMonth();
                
                // 更新月份显示
                document.getElementById('current-month').textContent = `${year}年${month + 1}月`;
                
                // 获取日历网格
                const grid = document.getElementById('calendar-grid');
                
                // 使用文档片段减少DOM操作
                const fragment = document.createDocumentFragment();
                
                // 计算月份数据
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const firstDayOfMonth = new Date(year, month, 1).getDay();
                const today = new Date();
                
                // 添加上个月的日期
                const prevMonth = month === 0 ? 11 : month - 1;
                const prevYear = month === 0 ? year - 1 : year;
                const daysInPrevMonth = new Date(prevYear, prevMonth + 1, 0).getDate();
                
                for (let i = firstDayOfMonth - 1; i >= 0; i--) {
                    const day = daysInPrevMonth - i;
                    const dateStr = `${prevYear}-${String(prevMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const courses = state.courses.filter(c => c.date === dateStr);
                    fragment.appendChild(render.createDayCell(day, dateStr, courses, false, false));
                }
                
                // 添加当前月的日期
                for (let day = 1; day <= daysInMonth; day++) {
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const courses = state.courses.filter(c => c.date === dateStr);
                    const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === day;
                    fragment.appendChild(render.createDayCell(day, dateStr, courses, true, isToday));
                }
                
                // 添加下个月的日期
                const totalCells = 42;
                const cellsAdded = firstDayOfMonth + daysInMonth;
                const nextMonthCells = totalCells - cellsAdded;
                
                const nextMonth = month === 11 ? 0 : month + 1;
                const nextYear = month === 11 ? year + 1 : year;
                
                for (let day = 1; day <= nextMonthCells; day++) {
                    const dateStr = `${nextYear}-${String(nextMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const courses = state.courses.filter(c => c.date === dateStr);
                    fragment.appendChild(render.createDayCell(day, dateStr, courses, false, false));
                }
                
                // 一次性添加所有单元格，减少DOM重排
                grid.innerHTML = '';
                grid.appendChild(fragment);
            },
            
            // 创建日期单元格
            createDayCell: (day, dateStr, courses, isCurrentMonth, isToday) => {
                const cell = document.createElement('div');
                const bgClass = isCurrentMonth ? (isToday ? 'bg-blue-50' : 'bg-white') : 'bg-gray-50';

            // 渲染统计页面
            statistics: (year, month, organization = '') => {
                console.log('📊 渲染统计页面:', { year, month, organization, courses: state.courses.length, students: state.students.length });
                
                // 填充机构筛选下拉菜单
                const organizationOptions = document.getElementById('statistics-organization-options');
                const organizationTrigger = document.querySelector('#statistics-organization-trigger span');
                if (organizationOptions) {
                    // 保存当前选中的值
                    const currentValue = getCustomSelectValue('statistics-organization-wrapper');
                    // 清空现有选项，只保留"全部机构"
                    organizationOptions.innerHTML = '<div class="custom-option ' + (currentValue === '' ? 'selected' : '') + '" data-value="">全部机构</div>';
                    // 添加所有机构选项
                    state.organizations.forEach(org => {
                        const optionDiv = document.createElement('div');
                        optionDiv.className = 'custom-option' + (org === currentValue ? ' selected' : '');
                        optionDiv.dataset.value = org;
                        optionDiv.textContent = org;
                        organizationOptions.appendChild(optionDiv);
                    });
                    // 更新触发器显示文本
                    if (organizationTrigger) {
                        const selectedOption = organizationOptions.querySelector('.custom-option.selected');
                        organizationTrigger.textContent = selectedOption ? selectedOption.textContent : '全部机构';
                    }
                }
                
                // 过滤当月课程
                const filteredCourses = state.courses.filter(course => {
                    const courseDate = new Date(course.date);
                    return courseDate.getFullYear() === year && courseDate.getMonth() === month;
                });
                console.log('📊 过滤后课程:', filteredCourses.length);
                
                // 初始化统计数据
                const stats = {
                    totalCourses: 0,
                    totalFee: 0,
                    uniqueStudents: new Set(),
                    byOrganization: {},
                    byLessonType: {},
                    byStudent: {},
                    // 新增详细统计：按课型、年级、机构、人数
                    detailedStats: {
                        '一对一': {},
                        '多人课': {}
                    }
                };
                
                // 计算统计数据
                filteredCourses.forEach(course => {
                    let shouldCountCourse = false;
                    const courseLessonType = course.lessonType || '一对一';
                    const isGroupLesson = courseLessonType === '多人课';
                    
                    // 先处理多人课的一次性费用计算
                    if (isGroupLesson) {
                        // 获取多人课的费用（只计算一次）
                        const groupFee = course.fees && course.fees[0] !== undefined ? course.fees[0] : 0;
                        
                        // 检查是否有任何学生符合机构筛选条件
                        let hasMatchingStudent = false;
                        let firstMatchingStudent = null;
                        
                        if (course.studentIds && Array.isArray(course.studentIds)) {
                            for (const studentId of course.studentIds) {
                                const student = state.students.find(s => s.id === studentId);
                                if (student && (!organization || student.organization === organization)) {
                                    hasMatchingStudent = true;
                                    firstMatchingStudent = student;
                                    break;
                                }
                            }
                        } else if (course.studentId) {
                            const student = state.students.find(s => s.id === course.studentId);
                            if (student && (!organization || student.organization === organization)) {
                                hasMatchingStudent = true;
                                firstMatchingStudent = student;
                            }
                        }
                        
                        // 只有在有匹配学生时才计算多人课费用
                        if (hasMatchingStudent && firstMatchingStudent) {
                            stats.totalFee += groupFee;
                            stats.totalCourses++;
                            
                            // 机构统计（多人课费用计入第一个匹配学生的机构）
                            if (!stats.byOrganization[firstMatchingStudent.organization]) {
                                stats.byOrganization[firstMatchingStudent.organization] = { fee: 0, courses: 0, students: new Set() };
                            }
                            stats.byOrganization[firstMatchingStudent.organization].fee += groupFee;
                            stats.byOrganization[firstMatchingStudent.organization].courses += 1;
                            
                            // 课型统计（多人课费用只算一次）
                            if (!stats.byLessonType[courseLessonType]) {
                                stats.byLessonType[courseLessonType] = { fee: 0, courses: 0, students: new Set() };
                            }
                            stats.byLessonType[courseLessonType].fee += groupFee;
                            stats.byLessonType[courseLessonType].courses += 1;
                        }
                    }
                    
                    const processStudent = (studentId, index) => {
                        const student = state.students.find(s => s.id === studentId);
                        if (!student) return;
                        
                        // 机构筛选
                        if (organization && student.organization !== organization) {
                            return;
                        }
                        
                        // 对于一对一课程，计算学生的费用；对于多人课，不重复计算费用
                        let fee = 0;
                        if (!isGroupLesson) {
                            // 一对一使用学生预设费用
                            fee = course.fees && course.fees[index] !== undefined ? course.fees[index] : 
                                 (student.fees?.['一对一'] || student.fee || 0);
                            stats.totalFee += fee;
                            // 只对一对一课程计数，且只计数一次
                            if (!isGroupLesson && !shouldCountCourse) {
                                stats.totalCourses++;
                                shouldCountCourse = true;
                            }
                        }
                        
                        stats.uniqueStudents.add(studentId);
                        
                        // 学生统计
                        if (!stats.byStudent[studentId]) {
                            stats.byStudent[studentId] = {
                                name: student.name,
                                organization: student.organization,
                                lessonTypes: student.lessonTypes || (student.lessonType ? [student.lessonType] : []),
                                fee: 0,
                                courses: 0
                            };
                        }
                        // 一对一课程计算学生费用，多人课不计算学生费用
                        stats.byStudent[studentId].fee += fee;
                        stats.byStudent[studentId].courses += 1;
                        
                        // 机构统计（多人课的费用已经在上面统一计算了）
                        if (!stats.byOrganization[student.organization]) {
                            stats.byOrganization[student.organization] = { fee: 0, courses: 0, students: new Set() };
                        }
                        // 一对一课程计算机构费用，多人课不重复计算
                        if (!isGroupLesson) {
                            stats.byOrganization[student.organization].fee += fee;
                        }
                        stats.byOrganization[student.organization].courses += isGroupLesson ? 0 : 1;
                        stats.byOrganization[student.organization].students.add(studentId);
                        
                        // 课型统计（多人课的费用已经在上面统一计算了）
                        if (!stats.byLessonType[courseLessonType]) {
                            stats.byLessonType[courseLessonType] = { fee: 0, courses: 0, students: new Set() };
                        }

                modal.show(content);
                
                // 添加回车键保存功能
                document.getElementById('edit-student-form').addEventListener('keypress', (event) => {
                    if (event.key === 'Enter' && !event.target.matches('textarea')) {
                        event.preventDefault();
                        document.getElementById('edit-student-save').click();
                    }
                });
                
                // 初始化自定义下拉菜单
                initCustomSelects();
                
                // 绑定保存按钮事件
                document.getElementById('edit-student-save').addEventListener('click', () => {
                    const id = document.getElementById('edit-student-id').value;
                    const name = utils.escapeHtml(document.getElementById('edit-student-name').value.trim());
                    const organization = getCustomSelectValue('edit-student-organization-wrapper');
                    
                    // 获取课型选择
                    const oneOnOneChecked = document.getElementById('edit-lesson-type-one-on-one').checked;
                    const groupChecked = document.getElementById('edit-lesson-type-group').checked;
                    
                    // 验证至少选择一种课型
                    if (!oneOnOneChecked && !groupChecked) {
                        notification.show('请至少选择一种课型', 'error');
                        return;
                    }
                    
                    // 构建课型数组和费用对象
                    const newLessonTypes = [];
                    const newFees = {};
                    
                    if (oneOnOneChecked) {
                        newLessonTypes.push('一对一');
                        const feeInput = document.getElementById('edit-fee-one-on-one').value;
                        const fee = parseFloat(feeInput);
                        if (feeInput === '' || isNaN(fee) || fee < 0) {
                            notification.show('请填写一对一每节课费用', 'error');
                            return;
                        }
                        newFees['一对一'] = fee;
                    }
                    
                    if (groupChecked) {
                        newLessonTypes.push('多人课');
                        // 多人课费用在排课时填写，这里不设置
                        newFees['多人课'] = 0;
                    }
                    
                    // 验证输入
                    if (!name || !organization) {
                        notification.show('请填写完整信息', 'error');
                        return;
                    }
                    
                    const studentIndex = state.students.findIndex(s => s.id === id);
                    if (studentIndex !== -1) {
                        const oldStudent = state.students[studentIndex];
                        const isOrganizationChanged = oldStudent.organization !== organization;
                        const isNameChanged = oldStudent.name !== name;
                        
                        const grade = getCustomSelectValue('edit-student-grade-wrapper');
                    
                    state.students[studentIndex] = {
                        ...state.students[studentIndex],
                        name,
                        organization,
                        grade,
                        lessonTypes: newLessonTypes,
                        fees: newFees,
                        updatedAt: new Date().toISOString()
                    };
                        
                        // 如果机构或姓名改变，更新相关课程的颜色和名称信息
                        if (isOrganizationChanged || isNameChanged) {
                            const newColor = utils.generateColor(organization);
                            
                            state.courses.forEach(course => {
                                // 处理多名学生的课程
                                if (course.studentIds) {
                                    const studentPos = course.studentIds.indexOf(id);
                                    if (studentPos !== -1) {
                                        // 更新学生姓名和颜色
                                        course.studentNames[studentPos] = name;
                                        course.organizations[studentPos] = organization;
                                        course.colors[studentPos] = newColor;
                                    }
                                } else {
                                    // 处理单个学生的课程（兼容旧格式）
                                    if (course.studentId === id) {
                                        // 对于旧格式课程，我们在渲染时会动态计算颜色，所以这里不需要更新
                                        // 但如果课程中有存储学生姓名，也需要更新
                                        if (course.studentName) {
                                            course.studentName = name;
                                        }
                                        if (course.organization) {
                                            course.organization = organization;
                                        }
                                        if (course.color) {
                                            course.color = newColor;
                                        }
                                    }
                                }
                            });
                        }
                        
                        utils.saveData();
                        render.students();
                        render.calendar(); // 更新日历中的颜色
                        modal.hide();
                        
                        notification.show('学生信息更新成功');
                    }
                });

        // 根据开始时间计算结束时间
        function calculateEndTime(startId, endId, minutesToAdd) {
            const startTimeInput = document.getElementById(startId);
            const endTimeInput = document.getElementById(endId);
            
            if (startTimeInput && endTimeInput) {
                const startTime = startTimeInput.value;
                if (startTime) {
                    const [hours, minutes] = startTime.split(':').map(Number);
                    const totalMinutes = hours * 60 + minutes + minutesToAdd;
                    const endHours = Math.floor(totalMinutes / 60) % 24;
                    const endMinutes = totalMinutes % 60;
                    
                    const formattedEndTime = `${endHours.toString().padStart(2, '0')}:${endMinutes.toString().padStart(2, '0')}`;
                    endTimeInput.value = formattedEndTime;
                    
                    // 触发费用计算
                    setTimeout(() => {

                            calculateFee();
                        }
                    }, 10);
                }
            }
        }

        // 计算课程时长（分钟）
        function calculateDuration() {
            const startTime = document.getElementById('course-start-time').value;
            const endTime = document.getElementById('course-end-time').value;
            
            if (startTime && endTime) {
                const [startHour, startMinute] = startTime.split(':').map(Number);
                const [endHour, endMinute] = endTime.split(':').map(Number);
                
                const startTotalMinutes = startHour * 60 + startMinute;
                const endTotalMinutes = endHour * 60 + endMinute;
                
                return endTotalMinutes - startTotalMinutes;
            }
            return 120; // 默认2小时
        }
        
        // 根据课程时长计算费用
        function calculateFee() {
            // 检查当前课型
            const lessonType = document.querySelector('input[name="course-lesson-type"]:checked')?.value;
            if (lessonType !== '一对一') return; // 只对一对一课程计算费用
            
            const selectedStudents = Array.from(document.querySelectorAll('.student-btn.selected'));
            if (selectedStudents.length === 0) return;
            
            const studentId = selectedStudents[0].dataset.id;
            const student = state.students.find(s => s.id === studentId);
            if (!student) return;
            
            const studentFees = student.fees || (student.fee ? { '一对一': student.fee } : {});
            const baseFee = studentFees['一对一'] || 0;
            const duration = calculateDuration();
            
            // 按120分钟的价格计算实际费用
            const calculatedFee = (baseFee / 120) * duration;
            
            const feeInput = document.getElementById('course-fee');
            if (feeInput) {
                feeInput.value = calculatedFee.toFixed(2);
            }
        }

        // 设置Firebase实时监听
        function setupFirebaseListeners() {
            const auth = window.firebaseAuth;
            if (window.firebaseDatabase && auth && auth.currentUser) {
                const userId = auth.currentUser.uid;
                const dbRef = window.firebaseRef(window.firebaseDatabase, `courseManagerData/${userId}`);
                window.firebaseOnValue(dbRef, (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        console.log('收到Firebase实时更新:', data);
                        
                        // 检查数据是否有变化
                        const hasChanged = 
                            JSON.stringify(data.students) !== JSON.stringify(state.students) ||
                            JSON.stringify(data.courses) !== JSON.stringify(state.courses) ||
                            JSON.stringify(data.organizations) !== JSON.stringify(state.organizations);
                        
                        if (hasChanged) {
                            updateFromFirebase(data);
                        }
                    }
                });
            } else {
                console.log('用户未登录，不启用Firebase实时监听');
            }
        }

        // 处理课程标签点击事件
        function handleCourseClick(element, courseId) {
            // 使用闭包保持clickCount状态
            if (!element._clickCount) {
                element._clickCount = 0;
            }
            element._clickCount++;
            
            // 保存当前课程ID，确保在setTimeout中使用正确的ID
            const currentCourseId = courseId;
            
            setTimeout(() => {
                // 无论是单击还是双击，都先触发选中效果
                // 移除其他课程的选中状态
                document.querySelectorAll('.course-item-selected').forEach(el => {
                    el.classList.remove('course-item-selected');
                });
                // 移除日期的选中状态
                document.querySelectorAll('.calendar-cell-selected').forEach(el => {
                    el.classList.remove('calendar-cell-selected');
                });
                // 添加选中状态
                element.classList.add('course-item-selected');
                // 使选中的课程标签获得焦点，以便响应键盘事件
                element.tabIndex = 0;
                element.focus();
                
                if (element._clickCount === 2) {
                    // 双击 - 触发课程编辑
                    const course = state.courses.find(c => c.id === currentCourseId);
                    if (course) {
                        modal.showEditCourse(course);
                    }
                }
                element._clickCount = 0;
            }, 300);
            
            // 检查是否已经添加了事件监听器
            if (!element.dataset.keydownListenerAdded) {
                // 保存当前课程ID，确保在事件监听器中使用正确的ID
                const currentCourseId = courseId;
                
                // 支持复制粘贴功能
                element.addEventListener('keydown', function(e) {
                    if (e.ctrlKey && e.key === 'c') {
                        // 复制选中的课程
                        const course = state.courses.find(c => c.id === currentCourseId);
                        if (course) {
                            localStorage.setItem('copiedCourses', JSON.stringify([course]));
                            notification.show('课程已复制');
                        }
                    } else if (e.ctrlKey && e.key === 'v') {
                        // 粘贴课程到当前课程所在的日期
                        const copiedCourses = localStorage.getItem('copiedCourses');
                        if (copiedCourses) {
                            try {
                                const courses = JSON.parse(copiedCourses);
                                const currentCourse = state.courses.find(c => c.id === currentCourseId);
                                if (currentCourse) {
                                    let addedCount = 0;
                                    courses.forEach(course => {
                                        // 检查是否已经存在相同的课程
                                        const isDuplicate = state.courses.some(existingCourse => {
                                            return existingCourse.date === currentCourse.date &&
                                                   existingCourse.startTime === course.startTime &&
                                                   existingCourse.endTime === course.endTime &&
                                                   existingCourse.lessonType === course.lessonType &&
                                                   JSON.stringify(existingCourse.studentIds) === JSON.stringify(course.studentIds);
                                        });
                                        
                                        if (!isDuplicate) {
                                            const newCourse = {
                                                ...course,
                                                id: utils.generateId(),
                                                date: currentCourse.date,
                                                createdAt: new Date().toISOString()
                                            };
                                            state.courses.push(newCourse);
                                            addedCount++;
                                        }
                                    });
                                    
                                    if (addedCount > 0) {
                                        utils.saveData();
                                        render.calendar();
                                        notification.show(`成功粘贴 ${addedCount} 节课程`);
                                    } else {
                                        notification.show('没有可粘贴的课程或课程已存在', 'warning');
                                    }
                                }
                            } catch (error) {
                                console.error('粘贴课程失败:', error);
                                notification.show('粘贴课程失败', 'error');
                            }
                        } else {
                            notification.show('没有可粘贴的课程', 'warning');
                        }
                    }
                });
                element.dataset.keydownListenerAdded = 'true';
            }
        }

                        modal.showConfirm('确定要删除这节课程吗？', () => {
                            state.courses = state.courses.filter(c => c.id !== courseId);
                            utils.saveData();
                            render.calendar();
                            notification.show('课程删除成功');
                        });
                    }
                    
                    // 隐藏右键菜单
                    contextMenu.classList.add('hidden');
                };
            });
        }
        
        // 启动应用
        init();
        initAuth();

        
        // 全局点击事件，点击其他地方时隐藏右键菜单
        document.addEventListener('click', function(e) {
            const contextMenu = document.getElementById('context-menu');
            if (contextMenu && !contextMenu.contains(e.target) && !e.target.closest('.course-item') && !e.target.closest('.calendar-cell')) {
                contextMenu.classList.add('hidden');
            }
        });
        
        // 程序关闭前同步数据（仅当用户已登录时）
        window.addEventListener('beforeunload', function() {
            // 检查用户是否已登录
            const auth = window.firebaseAuth;
            const isLoggedIn = auth && auth.currentUser;
            
            // 只在Firebase可用且用户已登录时执行
            if (window.firebaseDatabase && isLoggedIn) {
                try {
                    // 获取本地数据
                    const localDataStr = localStorage.getItem('courseManagerData');
                    const localData = localDataStr ? JSON.parse(localDataStr) : null;
                    const localTimestamp = localData && localData.lastUpdated ? new Date(localData.lastUpdated).getTime() : 0;
                    
                    if (localTimestamp > 0) {
                        // 比较服务器数据时间戳
                        const userId = auth.currentUser.uid;
                        const dbRef = window.firebaseRef(window.firebaseDatabase, `courseManagerData/${userId}`);
                        window.firebaseGet(dbRef).then((snapshot) => {
                            if (snapshot.exists()) {
                                const serverData = snapshot.val();
                                const serverTimestamp = serverData.lastUpdated ? new Date(serverData.lastUpdated).getTime() : 0;
                                
                                // 如果本地数据较新，同步到服务器
                                if (localTimestamp > serverTimestamp) {
                                    window.firebaseSet(dbRef, localData).then(() => {
                                        console.log('程序关闭前，本地数据已同步到服务器');
                                    }).catch((error) => {
                                        console.error('程序关闭前同步数据失败:', error);
                                    });
                                } else {
                                    console.log('服务器数据较新，无需同步');
                                }
                            } else {
                                // 服务器无数据，上传本地数据
                                window.firebaseSet(dbRef, localData).then(() => {
                                    console.log('程序关闭前，本地数据已上传到服务器');
                                }).catch((error) => {
                                    console.error('程序关闭前上传数据失败:', error);
                                });
                            }
                        }).catch((error) => {
                            console.error('获取服务器数据失败:', error);
                        });
                    }
                } catch (error) {
                    console.error('同步数据时出错:', error);
                }
            } else {
                console.log('用户未登录，程序关闭前不同步数据');
            }
        });

        // 自定义下拉菜单功能
        function initCustomSelects() {
            // 使用事件委托处理选项点击
            document.querySelectorAll('.custom-select').forEach(select => {
                const trigger = select.querySelector('.custom-select-trigger');
                const options = select.querySelector('.custom-select-options');
                
                if (!trigger || !options) return;
                
                // 如果已经初始化过，跳过（防止重复绑定）
                if (select.dataset.initialized === 'true') return;
                select.dataset.initialized = 'true';
                
                // 点击触发器展开/收缩
                trigger.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const isOpen = options.classList.contains('open');
                    
                    // 关闭所有其他下拉菜单
                    document.querySelectorAll('.custom-select-options.open').forEach(opt => {
                        opt.classList.remove('open');
                        opt.previousElementSibling?.classList.remove('active');
                    });
                    
                    // 切换当前下拉菜单
                    if (!isOpen) {
                        options.classList.add('open');
                        trigger.classList.add('active');
                    }
                });
                
                // 使用事件委托处理选项点击
                options.addEventListener('click', (e) => {
                    const option = e.target.closest('.custom-option');
                    if (!option) return;
                    
                    e.stopPropagation();
                    
                    // 更新选中状态
                    options.querySelectorAll('.custom-option').forEach(opt => opt.classList.remove('selected'));
                    option.classList.add('selected');
                    
                    // 更新触发器文本
                    const value = option.dataset.value;
                    const text = option.textContent;
                    trigger.querySelector('span').textContent = text;
                    
                    // 关闭下拉菜单
                    options.classList.remove('open');
                    trigger.classList.remove('active');
                    
                    // 触发自定义事件
                    select.dispatchEvent(new CustomEvent('change', { 
                        detail: { value, text }
                    }));
                    
                    // 如果是机构选择下拉菜单，自动刷新统计数据
                    if (select.id === 'statistics-organization-wrapper') {
                        const yearValue = getCustomSelectValue('statistics-year-wrapper');
                        const monthValue = getCustomSelectValue('statistics-month-wrapper');
                        const year = yearValue ? parseInt(yearValue) : new Date().getFullYear();
                        const month = monthValue ? parseInt(monthValue) : new Date().getMonth();
                        render.statistics(year, month, value);
                    }
                });
            });
            
            // 点击外部关闭所有下拉菜单（只绑定一次）
            if (!window.customSelectOutsideClickBound) {
                window.customSelectOutsideClickBound = true;
                document.addEventListener('click', () => {
                    document.querySelectorAll('.custom-select-options.open').forEach(options => {
                        options.classList.remove('open');
                        options.previousElementSibling?.classList.remove('active');
                    });
                });
            }
        }
        
        // 辅助函数：获取自定义下拉菜单的选中值
        function getCustomSelectValue(wrapperId) {
            const wrapper = document.getElementById(wrapperId);
            if (!wrapper) return null;
            const selected = wrapper.querySelector('.custom-option.selected');
            return selected ? selected.dataset.value : null;
        }
        
        // 辅助函数：设置自定义下拉菜单的值
        function setCustomSelectValue(wrapperId, value) {
            const wrapper = document.getElementById(wrapperId);
            if (!wrapper) return;
            const options = wrapper.querySelectorAll('.custom-option');
            const trigger = wrapper.querySelector('.custom-select-trigger span');
            options.forEach(opt => {
                if (opt.dataset.value === String(value)) {
                    opt.classList.add('selected');
                    if (trigger) trigger.textContent = opt.textContent;
                } else {
                    opt.classList.remove('selected');
                }
            });
        }
        
        // 页面加载完成后初始化自定义下拉菜单
        document.addEventListener('DOMContentLoaded', initCustomSelects);
    </script>
